# =============================================================================
# CITADEL — TLS-terminating reverse proxy (production compose stack)
# -----------------------------------------------------------------------------
# Mounted at /etc/nginx/conf.d/default.conf inside the nginx:alpine `proxy`
# service. It terminates TLS at :443, redirects :80 -> :443, and reverse-proxies
# everything to the internal `citadel` service on port 8080.
#
# TLS material is mounted read-only at /etc/nginx/certs (see ../certs/.gitkeep):
#     /etc/nginx/certs/fullchain.pem
#     /etc/nginx/certs/privkey.pem
#
# Style mirrors the hardened nginx configs under deploy/aws-gov & deploy/azure-gov.
# =============================================================================

# ---- Upstream: the internal app service (resolved on the Docker network) ----
upstream citadel_app {
    server citadel:8080;
    keepalive 32;
}

# ---- HTTP :80 — redirect everything to HTTPS (and serve ACME challenges) -----
server {
    listen 80;
    listen [::]:80;
    server_name _;

    server_tokens off;

    # Let's Encrypt / certbot HTTP-01 challenge passthrough (if you use it).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else: permanent redirect to HTTPS.
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- HTTPS :443 — TLS termination + reverse proxy to the app ----------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name _;

    # ---- TLS certificate material (mounted read-only) -----------------------
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # ---- Modern TLS policy (TLS 1.2+ only; prefer 1.3) ----------------------
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    # OCSP stapling (works once you supply CA-issued certs with a chain).
    # ssl_stapling on;
    # ssl_stapling_verify on;

    # ---- Hardening / hygiene ------------------------------------------------
    server_tokens off;
    client_max_body_size 256m;          # CITADEL ingests archives/binaries for scanning
    client_body_buffer_size 128k;
    large_client_header_buffers 4 16k;
    client_body_timeout   30s;
    client_header_timeout 15s;
    send_timeout          60s;

    # ---- Security response headers ------------------------------------------
    # HSTS only makes sense once TLS is real (not the self-signed dev cert).
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    # The app emits its own Content-Security-Policy with per-request nonces; we
    # deliberately do NOT override CSP here so the nonce-based policy survives.

    # ---- Logging (-> stdout/stderr -> container log driver) -----------------
    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    # ---- Local health passthrough (used by the proxy container HEALTHCHECK) -
    # Answered by nginx itself so it does not depend on the upstream being up.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # ---- Reverse proxy: everything else -> the app --------------------------
    location / {
        proxy_pass http://citadel_app;
        proxy_http_version 1.1;

        # Preserve client/proxy context for the app (real IP, scheme, host).
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Connection        "";

        # Generous timeouts: deep scans (Semgrep/Trivy/Grype/ClamAV) can be slow.
        proxy_connect_timeout 10s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;

        # Stream responses; don't buffer large scan reports to disk.
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # ---- Deny access to dotfiles / VCS metadata -----------------------------
    location ~ /\.(?!well-known) {
        deny all;
        return 404;
    }
}
