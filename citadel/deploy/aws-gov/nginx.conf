# =============================================================================
# CITADEL — Hardened Nginx configuration (AWS GovCloud production front-end)
# Serves the static CITADEL SPA. Runs as non-root on a non-privileged port.
# Security headers tuned for CSP compliance, FedRAMP High / CUI workloads.
# =============================================================================

worker_processes auto;
# PID and temp paths live under /tmp so the container root FS can stay read-only.
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ---- Writable temp paths (read-only root FS compatible) -----------------
    client_body_temp_path /tmp/nginx/client_body;
    proxy_temp_path       /tmp/nginx/proxy;
    fastcgi_temp_path     /tmp/nginx/fastcgi;
    uwsgi_temp_path       /tmp/nginx/uwsgi;
    scgi_temp_path        /tmp/nginx/scgi;

    # ---- Hardening: hide version, limit request sizes -----------------------
    server_tokens off;
    client_max_body_size 256m;      # CITADEL ingests archives/executables for scanning
    client_body_buffer_size 128k;
    large_client_header_buffers 4 16k;

    # ---- Logging (forwarded to CloudWatch via awslogs driver) ---------------
    log_format citadel '$remote_addr - $remote_user [$time_iso8601] '
                       '"$request" $status $body_bytes_sent '
                       '"$http_referer" "$http_user_agent" rt=$request_time';
    access_log /dev/stdout citadel;
    error_log  /dev/stderr warn;

    # ---- Performance --------------------------------------------------------
    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;
    keepalive_timeout 30;
    reset_timedout_connection on;

    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_comp_level   6;
    gzip_proxied      any;
    gzip_types        text/plain text/css text/javascript application/javascript
                      application/json application/wasm image/svg+xml application/manifest+json;

    # =========================================================================
    server {
        # Non-privileged port so the worker can run as non-root (UID 10001).
        listen 8080;
        listen [::]:8080;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # ---- Security response headers --------------------------------------
        # CSP allows the SPA's CDN dependencies (JSZip + Chart.js from jsdelivr).
        # Tighten to a self-hosted/SRI policy for the most restrictive ATO posture.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'; upgrade-insecure-requests" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        add_header X-Permitted-Cross-Domain-Policies "none" always;

        # ---- Health check (used by ALB target group + container HEALTHCHECK) -
        location = /healthz {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }

        # ---- Static asset caching -------------------------------------------
        location ~* \.(?:css|js|mjs|woff2?|png|jpg|jpeg|gif|svg|ico|wasm)$ {
            expires 7d;
            add_header Cache-Control "public, max-age=604800, immutable";
            try_files $uri =404;
        }

        # ---- SPA routing: fall back to index.html ---------------------------
        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache";
        }

        # ---- Deny access to dotfiles / VCS metadata -------------------------
        location ~ /\.(?!well-known) {
            deny all;
            return 404;
        }
    }
}
