# =============================================================================
# CITADEL — hardened Nginx configuration (non-root, IL4/IL5-oriented)
# Code Inspection, Threat Analysis & Deployment Evaluation Lab
#
# - Runs as the unprivileged 'nginx' user on port 8080.
# - Emits a strict security-header set (CSP/HSTS/XFO/etc.).
# - Serves the static SPA with SPA fallback to /index.html.
# - Exposes /healthz for liveness/readiness probes.
# - Enforces request size limits and gzip for static assets.
# =============================================================================

# Worker runs as non-root; 'user' directive is intentionally omitted so the
# master (already started as 'nginx' via Dockerfile USER) does not try to setuid.
worker_processes auto;

# PID in a writable, non-privileged location (matches Dockerfile).
pid /var/run/nginx/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ---- Writable temp paths (non-root) ------------------------------------
    client_body_temp_path /tmp/nginx/client_body;
    proxy_temp_path       /tmp/nginx/proxy;
    fastcgi_temp_path     /tmp/nginx/fastcgi;
    uwsgi_temp_path       /tmp/nginx/uwsgi;
    scgi_temp_path        /tmp/nginx/scgi;

    # ---- Hardening / hygiene ----------------------------------------------
    server_tokens off;                 # do not leak nginx version (SI-/SC-)
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 30;
    types_hash_max_size 2048;

    # Request size & timeout limits (DoS resistance / SC-5).
    client_max_body_size      25m;     # uploads are quarantined server-side; cap here
    client_body_buffer_size   128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;
    client_body_timeout   15s;
    client_header_timeout 15s;
    send_timeout          15s;

    # ---- Logging (-> stdout/stderr -> Container Apps -> Log Analytics) -----
    log_format citadel '$remote_addr - $remote_user [$time_iso8601] '
                       '"$request" $status $body_bytes_sent '
                       '"$http_referer" "$http_user_agent" rt=$request_time';
    access_log /dev/stdout citadel;
    error_log  /dev/stderr warn;

    # ---- Compression -------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ---- TLS policy (when in-container TLS is enabled) ---------------------
    # External TLS is normally terminated at the Azure WAF / Front Door Gov with
    # FIPS-validated platform crypto. If terminating here, use TLS 1.2+ only.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    server {
        listen 8080;
        listen [::]:8080;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # ---- Security headers (applied to all responses) -------------------
        # CSP allows JSZip + Chart.js from jsdelivr (the SPA's CDN dependencies);
        # tighten to a self-hosted bundle for the strictest IL5 posture.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data: blob:; font-src 'self' https://cdn.jsdelivr.net data:; connect-src 'self' https://api.osv.dev; worker-src 'self' blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        add_header X-Permitted-Cross-Domain-Policies "none" always;

        # ---- Health endpoint (probes; no logging noise) --------------------
        location = /healthz {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }

        # ---- Static asset caching ------------------------------------------
        location ~* \.(?:css|js|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
            expires 7d;
            add_header Cache-Control "public, max-age=604800, immutable";
            try_files $uri =404;
        }

        # ---- Block dotfiles / sensitive paths ------------------------------
        location ~ /\.(?!well-known).* {
            deny all;
            return 404;
        }

        # ---- SPA routing: fall back to index.html --------------------------
        location / {
            add_header Cache-Control "no-cache";
            try_files $uri $uri/ /index.html;
        }

        # ---- Disallowed methods --------------------------------------------
        if ($request_method !~ ^(GET|HEAD|OPTIONS)$) {
            return 405;
        }
    }
}
