apiVersion: v2
name: citadel
description: >-
  CITADEL — Code Inspection, Threat Analysis & Deployment Evaluation Lab.
  A Node 20 Express server that serves a SPA and runs source-code / executable
  security scanners. This chart deploys the production service with a hardened,
  least-privilege pod security posture (non-root, read-only root FS, dropped
  capabilities, seccomp RuntimeDefault) suitable for FedRAMP / NIST SP 800-53
  aligned environments.
type: application

# version  = the chart version (SemVer). Bump on any chart change.
# appVersion = the CITADEL application version this chart ships by default.
version: 1.0.0
appVersion: "1.0.0"

kubeVersion: ">=1.23.0-0"

home: https://github.com/your-org/citadel
sources:
  - https://github.com/your-org/citadel

keywords:
  - security
  - compliance
  - sast
  - grc
  - scanning
  - fedramp
  - nist-800-53

maintainers:
  - name: CITADEL Platform Team
    email: platform@example.com

annotations:
  category: Security
