{{- /*
This Secret is rendered ONLY when secrets.create=true AND no existingSecret is
set. In production you should prefer an externally-managed Secret (ExternalSecrets
Operator, Sealed Secrets, or `kubectl create secret`) and set
secrets.create=false + secrets.existingSecret=<name>.

NEVER commit real values to values.yaml. Supply them at install time, e.g.:
  helm install citadel ./citadel \
    --set-string secrets.values.jwtSecret="$(openssl rand -hex 32)" \
    --set-string secrets.values.adminPassword="$ADMIN_PW"
Empty values are omitted so the Secret never ships placeholder credentials.
*/ -}}
{{- if and .Values.secrets.create (not .Values.secrets.existingSecret) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-secrets" (include "citadel.fullname" .) }}
  labels:
    {{- include "citadel.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- with .Values.secrets.values.jwtSecret }}
  {{ $.Values.secrets.keys.jwtSecret }}: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.values.adminEmail }}
  {{ $.Values.secrets.keys.adminEmail }}: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.values.adminPassword }}
  {{ $.Values.secrets.keys.adminPassword }}: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.values.databaseUrl }}
  {{ $.Values.secrets.keys.databaseUrl }}: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.values.superadminToken }}
  {{ $.Values.secrets.keys.superadminToken }}: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.values.metricsToken }}
  {{ $.Values.secrets.keys.metricsToken }}: {{ . | quote }}
  {{- end }}
{{- end }}
