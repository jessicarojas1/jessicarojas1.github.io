{{- if and .Values.metrics.enabled .Values.metrics.serviceMonitor.enabled -}}
# Requires the Prometheus Operator (monitoring.coreos.com/v1 CRD).
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "citadel.fullname" . }}
  {{- with .Values.metrics.serviceMonitor.namespace }}
  namespace: {{ . }}
  {{- end }}
  labels:
    {{- include "citadel.labels" . | nindent 4 }}
    {{- with .Values.metrics.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "citadel.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: http
      path: {{ .Values.metrics.path }}
      interval: {{ .Values.metrics.serviceMonitor.interval }}
      scrapeTimeout: {{ .Values.metrics.serviceMonitor.scrapeTimeout }}
      scheme: http
      {{- if .Values.metrics.serviceMonitor.bearerTokenSecret.name }}
      # /metrics is gated; present the CITADEL_METRICS_TOKEN bearer token.
      bearerTokenSecret:
        name: {{ .Values.metrics.serviceMonitor.bearerTokenSecret.name }}
        key: {{ .Values.metrics.serviceMonitor.bearerTokenSecret.key }}
      {{- end }}
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
{{- end }}
