# ============================================================================
# CITADEL Deployment — mirrors the Helm chart defaults.
# Default replicas: 2. HA with >1 replica REQUIRES a shared DATABASE_URL
# (set it in the Secret). Without a DB, scale to 1 and add a PVC for
# CITADEL_DATA_DIR (see 31-pvc.yaml.example referenced in the README).
# ============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: citadel
  namespace: citadel
  labels:
    app.kubernetes.io/name: citadel
    app.kubernetes.io/instance: citadel
    app.kubernetes.io/part-of: citadel
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: citadel
      app.kubernetes.io/instance: citadel
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: citadel
        app.kubernetes.io/instance: citadel
        app.kubernetes.io/part-of: citadel
    spec:
      serviceAccountName: citadel
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      # ---- Pod security context (NIST AC-6 / CM-7) ----
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: citadel
          image: ghcr.io/your-org/citadel-server:latest
          imagePullPolicy: IfNotPresent
          # ---- Container security context (hardened) ----
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            privileged: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "8080"
            # Writable scratch for untrusted uploads (read-only root FS).
            - name: CITADEL_TMP
              value: /tmp/citadel
            # --- Multi-tenancy: uncomment with a DATABASE_URL set ---
            # - name: CITADEL_MULTITENANT
            #   value: "1"
            # - name: CITADEL_BASE_DOMAIN
            #   value: "citadel.example.com"
            # --- Postgres TLS (uncomment when using external DB) ---
            # - name: PGSSL
            #   value: "1"
            # - name: PGSSL_VERIFY
            #   value: "1"
            # ---- Sensitive values from the Secret ----
            - name: CITADEL_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: citadel-secrets
                  key: CITADEL_JWT_SECRET
            - name: CITADEL_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: citadel-secrets
                  key: CITADEL_ADMIN_EMAIL
                  optional: true
            - name: CITADEL_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: citadel-secrets
                  key: CITADEL_ADMIN_PASSWORD
                  optional: true
            # Required for HA / multi-tenancy. optional:true lets the
            # file-store (single replica) mode start without it.
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: citadel-secrets
                  key: DATABASE_URL
                  optional: true
            - name: CITADEL_SUPERADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: citadel-secrets
                  key: CITADEL_SUPERADMIN_TOKEN
                  optional: true
            - name: CITADEL_METRICS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: citadel-secrets
                  key: CITADEL_METRICS_TOKEN
                  optional: true
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          volumeMounts:
            - name: citadel-tmp
              mountPath: /tmp/citadel
            - name: clamav-db
              mountPath: /var/lib/clamav
      volumes:
        # Memory-backed scratch so untrusted uploads never hit disk.
        - name: citadel-tmp
          emptyDir:
            medium: Memory
            sizeLimit: 512Mi
        # ClamAV virus DB dir (writable). Drop if AV scanning is off.
        - name: clamav-db
          emptyDir:
            sizeLimit: 1Gi
