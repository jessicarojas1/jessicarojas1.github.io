# TLS terminates here (NIST SC-8 / SC-13). Provide the cert in Secret
# "citadel-tls" (e.g. via cert-manager) and set your real host.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: citadel
  namespace: citadel
  labels:
    app.kubernetes.io/name: citadel
    app.kubernetes.io/part-of: citadel
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - citadel.example.com
      secretName: citadel-tls
  rules:
    - host: citadel.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: citadel
                port:
                  number: 80
