apiVersion: v1
kind: ServiceAccount
metadata:
  name: citadel
  namespace: citadel
  labels:
    app.kubernetes.io/name: citadel
    app.kubernetes.io/instance: citadel
    app.kubernetes.io/part-of: citadel
# The workload does not talk to the Kubernetes API — don't mount its token.
automountServiceAccountToken: false
