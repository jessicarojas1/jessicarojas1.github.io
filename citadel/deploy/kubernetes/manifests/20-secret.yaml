# ============================================================================
# PLACEHOLDER Secret — DO NOT COMMIT REAL VALUES.
# Preferred: create this out-of-band and DELETE this file from your apply set:
#
#   kubectl -n citadel create secret generic citadel-secrets \
#     --from-literal=CITADEL_JWT_SECRET="$(openssl rand -hex 32)" \
#     --from-literal=CITADEL_ADMIN_EMAIL="admin@example.com" \
#     --from-literal=CITADEL_ADMIN_PASSWORD="$(openssl rand -base64 24)" \
#     --from-literal=DATABASE_URL="postgres://user:pass@host:5432/citadel?sslmode=verify-full" \
#     --from-literal=CITADEL_SUPERADMIN_TOKEN="$(openssl rand -hex 32)" \
#     --from-literal=CITADEL_METRICS_TOKEN="$(openssl rand -hex 32)"
#
# Better still: manage it with the External Secrets Operator / Sealed Secrets
# pointed at Vault / AWS Secrets Manager / Azure Key Vault (NIST IA-5, SC-12/28).
#
# The stringData below is intentionally EMPTY so nothing sensitive lands in git.
# Fill values ONLY in a local copy, or skip this file entirely.
# ============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: citadel-secrets
  namespace: citadel
  labels:
    app.kubernetes.io/name: citadel
    app.kubernetes.io/part-of: citadel
type: Opaque
stringData:
  CITADEL_JWT_SECRET: ""        # REQUIRED — fill before applying
  CITADEL_ADMIN_EMAIL: ""       # initial admin (optional after first boot)
  CITADEL_ADMIN_PASSWORD: ""    # initial admin (optional after first boot)
  DATABASE_URL: ""              # required for HA replicas>1 & multi-tenancy
  CITADEL_SUPERADMIN_TOKEN: ""  # tenant provisioning operator token
  CITADEL_METRICS_TOKEN: ""     # bearer for GET /metrics
