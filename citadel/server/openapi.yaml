openapi: 3.0.3
info:
  title: CITADEL Deep-Scan API
  version: "1.0"
  description: >-
    Read-only security & compliance review API. Uploaded code is only ever READ
    by scanners — never executed. All findings normalize to one schema and map to
    22 compliance frameworks. Most routes are permission-gated when the global
    `enforce` toggle is on; when off (default) the scan routes are open.
servers:
  - url: /
    description: Same-origin (the SPA is served by this API)
security:
  - bearerAuth: []
tags:
  - name: Health
  - name: Auth
  - name: Scan
  - name: History
  - name: Dispositions
  - name: Admin
paths:
  /api/health:
    get:
      tags: [Health]
      summary: Liveness/readiness + capability probe
      security: []
      responses:
        "200":
          description: Service status, store, auth mode, and scanner availability+versions
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Health" }
  /api/auth/login:
    post:
      tags: [Auth]
      summary: Sign in (returns an access token + sets an httpOnly refresh cookie)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string, format: password }
      responses:
        "200":
          description: Authenticated, or an MFA challenge
          headers:
            Set-Cookie:
              description: "citadel_rt=<jwt>; HttpOnly; Secure; SameSite=Strict; Path=/api/auth"
              schema: { type: string }
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/TokenResponse"
                  - type: object
                    properties:
                      mfaRequired: { type: boolean }
                      mfaToken: { type: string }
        "401": { $ref: "#/components/responses/Error" }
        "429": { $ref: "#/components/responses/Error" }
        "503": { $ref: "#/components/responses/Error" }
  /api/auth/mfa/verify:
    post:
      tags: [Auth]
      summary: Complete an MFA login with a TOTP/backup code
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mfaToken, code]
              properties: { mfaToken: { type: string }, code: { type: string } }
      responses:
        "200": { description: Authenticated, content: { application/json: { schema: { $ref: "#/components/schemas/TokenResponse" } } } }
        "401": { $ref: "#/components/responses/Error" }
  /api/auth/refresh:
    post:
      tags: [Auth]
      summary: Exchange the httpOnly refresh cookie (or a body token) for a new access token
      security: []
      responses:
        "200": { description: New access token, content: { application/json: { schema: { type: object, properties: { token: { type: string }, expiresIn: { type: integer } } } } } }
        "401": { $ref: "#/components/responses/Error" }
  /api/auth/me:
    get:
      tags: [Auth]
      summary: The current authenticated user (no secrets)
      responses:
        "200": { description: User, content: { application/json: { schema: { $ref: "#/components/schemas/User" } } } }
        "401": { $ref: "#/components/responses/Error" }
  /api/auth/password:
    post:
      tags: [Auth]
      summary: Change your own password (lifts the must-change flag)
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, required: [current, next], properties: { current: { type: string }, next: { type: string, minLength: 8 } } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Ok" } } } }
        "400": { $ref: "#/components/responses/Error" }
  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Revoke the current session and clear the refresh cookie
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Ok" } } } }
  /api/scan:
    post:
      tags: [Scan]
      summary: Scan uploaded files / archives (multipart, field "files")
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                files:
                  type: array
                  items: { type: string, format: binary }
      responses:
        "200": { description: Unified report, content: { application/json: { schema: { $ref: "#/components/schemas/Report" } } } }
        "400": { $ref: "#/components/responses/Error" }
        "413": { $ref: "#/components/responses/Error" }
  /api/scan-url:
    post:
      tags: [Scan]
      summary: Shallow-clone a public Git repo (SSRF-guarded) and scan it; optional subpath
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url: { type: string, format: uri, example: "https://github.com/owner/repo" }
                subpath: { type: string, description: "Scan only this subfolder of a monorepo", example: "citadel" }
      responses:
        "200": { description: Unified report, content: { application/json: { schema: { $ref: "#/components/schemas/Report" } } } }
        "400": { $ref: "#/components/responses/Error" }
  /api/explain:
    post:
      tags: [Scan]
      summary: AI-assisted remediation for one finding (opt-in; needs ANTHROPIC_API_KEY)
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, properties: { finding: { $ref: "#/components/schemas/Finding" } } } } }
      responses:
        "200": { description: Explanation + suggested fix (review required), content: { application/json: { schema: { type: object, properties: { model: { type: string }, text: { type: string } } } } } }
        "503": { $ref: "#/components/responses/Error" }
  /api/scans:
    get:
      tags: [History]
      summary: List durable scan summaries (owner-scoped for non-admins)
      parameters: [{ name: limit, in: query, schema: { type: integer, default: 100, maximum: 500 } }]
      responses:
        "200": { description: Scan summaries, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/ScanSummary" } } } } }
  /api/scans/{id}:
    get:
      tags: [History]
      summary: Re-download a stored report
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses:
        "200": { description: Report, content: { application/json: { schema: { $ref: "#/components/schemas/Report" } } } }
        "404": { $ref: "#/components/responses/Error" }
    delete:
      tags: [History]
      summary: Delete a stored report
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Ok" } } } }
  /api/dispositions:
    get:
      tags: [Dispositions]
      summary: Shared finding triage map { fingerprint -> state }
      responses:
        "200": { description: Map, content: { application/json: { schema: { type: object, additionalProperties: { $ref: "#/components/schemas/DispositionState" } } } } }
    post:
      tags: [Dispositions]
      summary: Set one finding's disposition (shared; requires a database)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fingerprint, state]
              properties:
                fingerprint: { type: string }
                state: { $ref: "#/components/schemas/DispositionState" }
      responses:
        "200": { description: OK, content: { application/json: { schema: { type: object, properties: { ok: { type: boolean }, state: { $ref: "#/components/schemas/DispositionState" } } } } } }
        "400": { $ref: "#/components/responses/Error" }
        "501": { $ref: "#/components/responses/Error" }
  /api/users:
    get:
      tags: [Admin]
      summary: List users (admin)
      responses:
        "200": { description: Users, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/User" } } } } }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
    post:
      tags: [Admin]
      summary: Create a user (admin)
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/NewUser" } } } }
      responses:
        "200": { description: Created user, content: { application/json: { schema: { $ref: "#/components/schemas/User" } } } }
        "400": { $ref: "#/components/responses/Error" }
  /api/users/{id}:
    patch:
      tags: [Admin]
      summary: Update a user — name/email/role/active/permissions (admin)
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      requestBody: { required: true, content: { application/json: { schema: { type: object } } } }
      responses:
        "200": { description: Updated user, content: { application/json: { schema: { $ref: "#/components/schemas/User" } } } }
        "400": { $ref: "#/components/responses/Error" }
    delete:
      tags: [Admin]
      summary: Delete a user (admin; last-admin guard)
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Ok" } } } }
        "400": { $ref: "#/components/responses/Error" }
  /api/users/{id}/password:
    post:
      tags: [Admin]
      summary: Admin-reset a user's password (forces must-change on next login)
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      requestBody: { required: true, content: { application/json: { schema: { type: object, required: [password], properties: { password: { type: string, minLength: 8 } } } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { type: object, properties: { ok: { type: boolean }, mustChange: { type: boolean } } } } } }
  /api/auth/settings:
    get:
      tags: [Admin]
      summary: Read access-control settings (enforce, branding)
      responses: { "200": { description: Settings, content: { application/json: { schema: { type: object } } } } }
    patch:
      tags: [Admin]
      summary: Toggle enforcement (admin)
      requestBody: { required: true, content: { application/json: { schema: { type: object, properties: { enforce: { type: boolean } } } } } }
      responses: { "200": { description: Updated settings, content: { application/json: { schema: { type: object } } } } }
  /metrics:
    get:
      tags: [Health]
      summary: Prometheus metrics (text exposition format)
      security: []
      responses: { "200": { description: Metrics, content: { text/plain: { schema: { type: string } } } } }
  /api/openapi.yaml:
    get:
      tags: [Health]
      summary: This OpenAPI 3.0 contract (YAML)
      security: []
      responses: { "200": { description: OpenAPI document, content: { application/yaml: { schema: { type: string } } } } }
  /api/auth/mfa:
    get:
      tags: [Auth]
      summary: MFA status for the current user
      responses: { "200": { description: Status, content: { application/json: { schema: { type: object, properties: { enabled: { type: boolean }, pending: { type: boolean } } } } } } }
  /api/auth/mfa/setup:
    post:
      tags: [Auth]
      summary: Begin TOTP enrollment (returns secret + otpauth URL)
      responses: { "200": { description: Secret, content: { application/json: { schema: { type: object, properties: { secret: { type: string }, otpauth: { type: string } } } } } } }
  /api/auth/mfa/enable:
    post:
      tags: [Auth]
      summary: Confirm TOTP and enable MFA (returns one-time backup codes)
      requestBody: { required: true, content: { application/json: { schema: { type: object, required: [token], properties: { token: { type: string } } } } } }
      responses: { "200": { description: Enabled, content: { application/json: { schema: { type: object, properties: { backupCodes: { type: array, items: { type: string } } } } } } } }
  /api/auth/mfa/disable:
    post:
      tags: [Auth]
      summary: Disable MFA (requires the current password)
      requestBody: { required: true, content: { application/json: { schema: { type: object, required: [password], properties: { password: { type: string } } } } } }
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Ok" } } } } }
  /api/auth/oidc/start:
    get:
      tags: [Auth]
      summary: Begin OIDC SSO (Authorization Code + PKCE); 302 to the IdP
      security: []
      responses: { "302": { description: Redirect to the identity provider }, "501": { $ref: "#/components/responses/Error" } }
  /api/auth/oidc/callback:
    get:
      tags: [Auth]
      summary: OIDC redirect URI — verifies the id_token and hands an access token to the SPA
      security: []
      parameters:
        - { name: code, in: query, schema: { type: string } }
        - { name: state, in: query, schema: { type: string } }
      responses: { "200": { description: HTML token-handoff page (sets the refresh cookie) }, "400": { $ref: "#/components/responses/Error" }, "403": { $ref: "#/components/responses/Error" } }
  /api/auth/sessions:
    get:
      tags: [Auth]
      summary: The caller's own active sessions (marks the current one)
      responses: { "200": { description: Sessions, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/Session" } } } } } }
  /api/sessions:
    get:
      tags: [Admin]
      summary: All active sessions + stats (admin)
      responses: { "200": { description: Sessions, content: { application/json: { schema: { type: object, properties: { stats: { type: object }, sessions: { type: array, items: { $ref: "#/components/schemas/Session" } } } } } } } }
  /api/sessions/{jti}:
    delete:
      tags: [Admin]
      summary: Revoke a specific session by jti (admin)
      parameters: [{ name: jti, in: path, required: true, schema: { type: string } }]
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Ok" } } } } }
  /api/users/{id}/revoke-sessions:
    post:
      tags: [Admin]
      summary: Revoke all of a user's sessions (admin)
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses: { "200": { description: OK, content: { application/json: { schema: { type: object, properties: { ok: { type: boolean }, revoked: { type: integer } } } } } } }
  /api/branding:
    get:
      tags: [Admin]
      summary: Current branding (logo/name/accent)
      security: []
      responses: { "200": { description: Branding, content: { application/json: { schema: { $ref: "#/components/schemas/Branding" } } } } }
    patch:
      tags: [Admin]
      summary: Update branding (admin; logo URL sanitized to http(s)/data:image)
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/Branding" } } } }
      responses: { "200": { description: Updated branding, content: { application/json: { schema: { $ref: "#/components/schemas/Branding" } } } } }
  /api/audit:
    get:
      tags: [Admin]
      summary: Security audit log (admin)
      parameters:
        - { name: type, in: query, schema: { type: string }, description: "Filter by event type prefix, e.g. login or finding.disposition" }
        - { name: limit, in: query, schema: { type: integer, default: 200 } }
      responses: { "200": { description: Audit events, content: { application/json: { schema: { type: object, properties: { stats: { type: object }, events: { type: array, items: { $ref: "#/components/schemas/AuditEvent" } } } } } } } }
  /api/audit/verify:
    get:
      tags: [Admin]
      summary: Verify the audit hash chain (admin)
      description: Re-walks the tamper-evident hash chain and reports whether any record was altered or removed.
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, description: true when the chain is intact }
                  count: { type: integer, description: number of chained records verified }
                  store: { type: string, enum: [postgres, memory] }
                  brokenAt: { type: [integer, "null"], description: seq of the first broken/tampered record, or null }
                  reason: { type: [string, "null"], description: human-readable cause when broken }
components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }
  responses:
    Error:
      description: Error (generic message; no stack/internal paths)
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
  schemas:
    Ok: { type: object, properties: { ok: { type: boolean } } }
    Error: { type: object, properties: { error: { type: string } } }
    DispositionState:
      type: string
      enum: [open, accepted, false-positive, remediated, na]
    TokenResponse:
      type: object
      properties:
        token: { type: string, description: Short-lived access JWT (Bearer) }
        expiresIn: { type: integer }
        user: { $ref: "#/components/schemas/User" }
    User:
      type: object
      description: Never includes pass/salt/mfaSecret.
      properties:
        id: { type: string }
        name: { type: string }
        email: { type: string, format: email }
        role: { type: string, enum: [admin, analyst, auditor, viewer] }
        active: { type: boolean }
        permissions: { type: object, additionalProperties: { type: boolean } }
        mustChange: { type: boolean }
        mfaEnabled: { type: boolean }
    NewUser:
      type: object
      required: [name, email, role, password]
      properties:
        name: { type: string }
        email: { type: string, format: email }
        role: { type: string, enum: [admin, analyst, auditor, viewer] }
        password: { type: string, minLength: 8 }
    Session:
      type: object
      properties:
        jti: { type: string }
        userId: { type: string }
        email: { type: string }
        role: { type: string }
        ip: { type: string }
        ua: { type: string }
        current: { type: boolean }
    Branding:
      type: object
      properties:
        logoUrl: { type: string, description: "http(s):// or data:image/... only" }
        orgName: { type: string }
        accent: { type: string, description: "Hex color" }
    AuditEvent:
      type: object
      properties:
        type: { type: string }
        actor: { type: string, nullable: true }
        ip: { type: string }
        detail: { type: string }
        ok: { type: boolean }
        ts: { type: string, format: date-time }
    ScannerStatus:
      type: object
      properties:
        tool: { type: string }
        available: { type: boolean }
        status: { type: string, enum: [ok, unavailable, failed] }
        version: { type: string, nullable: true }
        warning: { type: string, nullable: true }
        findings: { type: integer }
    Health:
      type: object
      properties:
        ok: { type: boolean }
        engine: { type: string }
        ai: { type: boolean }
        auth: { type: object, properties: { enforce: { type: boolean }, sso: { type: boolean } } }
        store: { type: object, properties: { users: { type: string }, durable: { type: boolean }, rateLimit: { type: string } } }
        scanners: { type: array, items: { $ref: "#/components/schemas/ScannerStatus" } }
    Scoring:
      type: object
      properties:
        security: { type: integer, description: "0–100, higher is better" }
        quality: { type: integer }
        overall: { type: integer }
        risk: { type: integer, description: "0–100, higher = worse" }
        riskBand: { type: string, enum: [Minimal, Low, Moderate, High, Critical] }
        grade: { type: string, enum: [A, B, C, D, E, F] }
        sev: { type: object, additionalProperties: { type: integer } }
    Finding:
      type: object
      description: The one normalized finding shape every tier/scanner emits.
      properties:
        fingerprint: { type: string, description: Stable, line-drift-resistant identity }
        ruleId: { type: string }
        name: { type: string }
        category: { type: string }
        severity: { type: string, enum: [critical, high, medium, low, info] }
        confidence: { type: string, enum: [high, medium, low] }
        cwe: { type: string, nullable: true, example: "CWE-89" }
        file: { type: string }
        line: { type: integer }
        snippet: { type: string }
        remediation: { type: string }
        source: { type: string, description: Producing scanner (heuristic/semgrep/codeql/…) }
        sources: { type: array, items: { type: string } }
        detection: { type: string, enum: [scanner, heuristic] }
        confirmed: { type: boolean }
        kind: { type: string, enum: [vuln, secret, cve, malware, pii, license, quality, policy] }
        tainted: { type: boolean }
        disposition: { $ref: "#/components/schemas/DispositionState" }
    ScanSummary:
      type: object
      properties:
        id: { type: string }
        ts: { type: string, format: date-time }
        source: { type: string }
        engine: { type: string }
        grade: { type: string }
        security: { type: integer }
        findings: { type: integer }
        critical: { type: integer }
        high: { type: integer }
    Report:
      type: object
      properties:
        meta:
          type: object
          properties:
            scannedAt: { type: string, format: date-time }
            engine: { type: string }
            fileCount: { type: integer }
            scanners: { type: array, items: { $ref: "#/components/schemas/ScannerStatus" } }
            scanSummary: { type: object, properties: { ran: { type: integer }, unavailable: { type: integer }, failed: { type: integer }, total: { type: integer } } }
        findings: { type: array, items: { $ref: "#/components/schemas/Finding" } }
        scoring: { $ref: "#/components/schemas/Scoring" }
        sbom: { type: object }
        binaries: { type: array, items: { type: object } }
        quality: { type: object }
        deployment: { type: array, items: { type: object } }
        posture: { type: array, items: { type: object } }
