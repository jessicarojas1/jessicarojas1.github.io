# AeroMarkup — local containerized stack (app + Postgres)
# Mirrors the GovCloud/Azure Gov topology so you can test the exact image
# before pushing to a registry.
#   docker compose up --build   →  http://localhost:8080
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aeromarkup
      POSTGRES_PASSWORD: aeromarkup
      POSTGRES_DB: aeromarkup
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aeromarkup"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://aeromarkup:aeromarkup@db:5432/aeromarkup
      AUTO_MIGRATE: "1"
      PORT: "8080"
    ports:
      - "8080:8080"

volumes:
  pgdata:
