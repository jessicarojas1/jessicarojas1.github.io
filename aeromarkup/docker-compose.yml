# AeroMarkup — local containerized stack (app + Postgres)
# Mirrors the GovCloud/Azure Gov topology so you can test the exact image
# before pushing to a registry.
#   docker compose up --build   →  http://localhost:8080
services:
  db:
    image: postgres:16-alpine@sha256:e013e867e712fec275706a6c51c966f0bb0c93cfa8f51000f85a15f9865a28cb  # postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aeromarkup}
      # Required: the stack refuses to start without a real password.
      # Set POSTGRES_PASSWORD in a local .env (never commit it).
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set (use a strong secret; do not commit)}
      POSTGRES_DB: ${POSTGRES_DB:-aeromarkup}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      # Bind to loopback only so Postgres is not exposed on all interfaces.
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aeromarkup"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Reuse the same required DB credentials as the db service.
      DATABASE_URL: postgres://${POSTGRES_USER:-aeromarkup}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set (use a strong secret; do not commit)}@db:5432/${POSTGRES_DB:-aeromarkup}
      AUTO_MIGRATE: "1"
      PORT: "8080"
    ports:
      - "8080:8080"

volumes:
  pgdata:
