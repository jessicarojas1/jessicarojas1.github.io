# AeroMarkup — Render blueprint
# Creates a Python web service + a managed PostgreSQL instance.
# DATABASE_URL is injected automatically from the database below.
services:
  - type: web
    name: aeromarkup
    runtime: python
    rootDir: aeromarkup
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 10000
      - key: AUTO_MIGRATE
        value: "1"
      - key: DATABASE_URL
        fromDatabase:
          name: aeromarkup-db
          property: connectionString
      - key: ENVIRONMENT
        value: production
      # Strong session signing key, generated and stored by Render (never in git).
      - key: AEROMARKUP_SECRET
        generateValue: true

databases:
  - name: aeromarkup-db
    plan: free
    databaseName: aeromarkup
    user: aeromarkup
