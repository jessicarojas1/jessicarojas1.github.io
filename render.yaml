services:
  - type: web
    name: business-insight-dashboard
    runtime: python
    rootDir: business-insight-dashboard
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    plan: free

  - type: web
    name: cmmc-compliance-agent
    runtime: python
    rootDir: cmmc-agent
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    plan: free
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false

  # CITADEL — source-code & executable security/compliance scanner (deep-scan backend).
  # Docker image bundles the SPA + real scanners (Semgrep, Trivy, Syft, Grype,
  # Gitleaks, Bandit, ClamAV). Build context MUST be the repo root.
  # Needs >=2GB RAM (ClamAV loads a ~1.4GB signature DB) -> 'standard' or higher.
  - type: web
    name: citadel
    runtime: docker
    dockerfilePath: ./citadel/server/Dockerfile
    dockerContext: .
    plan: standard
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # Optional: enables the AI "Explain & fix" feature. Set in the dashboard.
      - key: ANTHROPIC_API_KEY
        sync: false
