services:
  - type: web
    name: business-insight-dashboard
    runtime: python
    rootDir: business-insight-dashboard
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    plan: free

  - type: web
    name: cmmc-compliance-agent
    runtime: python
    rootDir: cmmc-agent
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    plan: free
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false

  - type: web
    name: nexus
    env: docker
    dockerfilePath: ./nexus/Dockerfile
    dockerContext: ./nexus
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nexus-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: APP_ENV
        value: production
      - key: NEXUS_ALLOW_DEFAULT_PINS
        value: "1"

databases:
  - name: nexus-db
    plan: free
    databaseName: nexus
    user: nexus
