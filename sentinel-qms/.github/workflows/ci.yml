name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sentinel-qms/backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sentinel
          POSTGRES_PASSWORD: ci_only
          POSTGRES_DB: sentinel_qms
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sentinel -d sentinel_qms"
          --health-interval 10s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://sentinel:ci_only@localhost:5432/sentinel_qms
      JWT_SECRET: ci-secret-not-a-real-secret-min-32chars
      ENVIRONMENT: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" || pip install -r requirements-dev.txt || pip install ruff mypy pytest
      - name: Lint (ruff)
        run: ruff check .
      - name: Format check (ruff)
        run: ruff format --check .
      - name: Type check (mypy)
        run: mypy app || echo "::warning::mypy reported issues"
      - name: Test (pytest)
        run: pytest -q --maxfail=1

  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sentinel-qms/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: sentinel-qms/frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Type check
        run: npm run typecheck --if-present
      - name: Test
        run: npm test --if-present -- --run
      - name: Build
        run: npm run build

  docker-build:
    name: Build images (no push)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: sentinel-qms/backend
          push: false
          tags: sentinel-qms/backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: sentinel-qms/frontend
          push: false
          tags: sentinel-qms/frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
