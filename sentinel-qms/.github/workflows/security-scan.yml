name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 7 * * 1" # weekly Monday 07:00 UTC

permissions:
  contents: read
  security-events: write # upload SARIF to code scanning

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc # v2
        env:
          GITLEAKS_CONFIG: ""

  iac-scan:
    name: IaC scan (checkov + tfsec)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Checkov (Terraform + Kubernetes + Dockerfile)
        # Pinned to a released major tag rather than the mutable @master branch,
        # which would execute any upstream commit immediately in a job that holds
        # security-events: write. TODO: pin to a full commit SHA for SLSA-grade
        # supply-chain integrity once network access allows resolving it.
        uses: bridgecrewio/checkov-action@fa9edf8f0a491c59a924ea6accd5bdcf07752cff # v12
        with:
          directory: sentinel-qms/infra
          framework: terraform,kubernetes,dockerfile,github_actions
          output_format: cli,sarif
          output_file_path: console,checkov.sarif
          soft_fail: true
      - name: Upload checkov SARIF
        uses: github/codeql-action/upload-sarif@b0c4fd77f6c559021d78430ec4d0d169ae74a4eb # v3
        if: always()
        with:
          sarif_file: checkov.sarif
          category: checkov
      - name: tfsec
        uses: aquasecurity/tfsec-sarif-action@21ded20e8ca120cd9d3d6ab04ef746477542a608 # v0.1.4
        with:
          working_directory: sentinel-qms/infra/terraform
          sarif_file: tfsec.sarif
      - name: Upload tfsec SARIF
        uses: github/codeql-action/upload-sarif@b0c4fd77f6c559021d78430ec4d0d169ae74a4eb # v3
        if: always()
        with:
          sarif_file: tfsec.sarif
          category: tfsec

  dependency-audit:
    name: Dependency audit (pip + npm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: pip-audit
        run: |
          pip install pip-audit
          pip-audit -r sentinel-qms/backend/requirements.txt || \
          pip-audit --project-path sentinel-qms/backend || \
          echo "::warning::pip-audit found advisories"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
      - name: npm audit
        working-directory: sentinel-qms/frontend
        run: npm audit --audit-level=high || echo "::warning::npm audit found advisories"

  image-scan:
    name: Image vulnerability scan (trivy)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Build image
        run: docker build -t sentinel-qms/${{ matrix.component }}:scan sentinel-qms/${{ matrix.component }}
      - name: Trivy scan
        uses: aquasecurity/trivy-action@6e7b7d1fd3e4fef0c5fa8cce1229c54b2c9bd0d8 # 0.24.0
        with:
          image-ref: sentinel-qms/${{ matrix.component }}:scan
          format: sarif
          output: trivy-${{ matrix.component }}.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@b0c4fd77f6c559021d78430ec4d0d169ae74a4eb # v3
        if: always()
        with:
          sarif_file: trivy-${{ matrix.component }}.sarif
          category: trivy-${{ matrix.component }}

  codeql:
    name: CodeQL (python + javascript)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        language: [python, javascript-typescript]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: github/codeql-action/init@b0c4fd77f6c559021d78430ec4d0d169ae74a4eb # v3
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/analyze@b0c4fd77f6c559021d78430ec4d0d169ae74a4eb # v3
        with:
          category: "/language:${{ matrix.language }}"
