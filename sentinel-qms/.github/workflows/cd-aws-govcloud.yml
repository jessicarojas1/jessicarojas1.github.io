name: CD — AWS GovCloud

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (default: commit SHA)"
        required: false
  push:
    tags:
      - "v*"

# OIDC federation to AWS — no long-lived access keys stored in GitHub.
permissions:
  id-token: write       # OIDC: AWS role assumption + GitHub attestation signing
  contents: read        # checkout
  attestations: write   # actions/attest-build-provenance (write subsumes the
                        # read needed by the `gh attestation verify` gate below)

concurrency:
  group: cd-aws-govcloud
  cancel-in-progress: false

env:
  AWS_REGION: us-gov-west-1
  TF_DIR: sentinel-qms/infra/terraform/aws-govcloud

jobs:
  deploy:
    name: Build, push & apply (GovCloud)
    runs-on: ubuntu-latest
    # Requires manual approval configured on this environment in repo settings.
    environment: aws-govcloud-prod
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Resolve image tag
        id: tag
        run: echo "tag=${{ github.event.inputs.image_tag || github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@ff717079ee2060e4bcee96c4779b553acc87447c # v4
        with:
          role-to-assume: ${{ secrets.AWS_GOV_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          # FIPS endpoint for STS in GovCloud.
          audience: sts.us-gov-west-1.amazonaws.com

      - name: Login to Amazon ECR (GovCloud)
        id: ecr
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2

      - name: Set up Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      # Build the backend image with buildx, push to ECR GovCloud, and attach an
      # SPDX SBOM + SLSA build provenance as in-toto attestations on the image.
      - name: Build & push backend
        id: build-backend
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: sentinel-qms/backend
          push: true
          tags: ${{ steps.ecr.outputs.registry }}/sentinel-qms/backend:${{ steps.tag.outputs.tag }}
          provenance: true
          sbom: true

      - name: Build & push frontend
        id: build-frontend
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: sentinel-qms/frontend
          push: true
          tags: ${{ steps.ecr.outputs.registry }}/sentinel-qms/frontend:${{ steps.tag.outputs.tag }}
          provenance: true
          sbom: true

      # GitHub-native (SLSA) build-provenance attestation keyed off the pushed
      # digest, mirroring release-aegis-image.yml. ECR (GovCloud) does not host
      # the GH attestations API, so push-to-registry is omitted — provenance is
      # stored in the GitHub attestations API (verifiable with `gh attestation
      # verify`), while the buildx provenance/SBOM above ride on the ECR image.
      - name: Attest backend provenance
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2
        with:
          subject-name: ${{ steps.ecr.outputs.registry }}/sentinel-qms/backend
          subject-digest: ${{ steps.build-backend.outputs.digest }}

      - name: Attest frontend provenance
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2
        with:
          subject-name: ${{ steps.ecr.outputs.registry }}/sentinel-qms/frontend
          subject-digest: ${{ steps.build-frontend.outputs.digest }}

      # ---------------------------------------------------------------------
      # SLSA VERIFY-AT-DEPLOY GATE (fail-closed).
      # Before any ECS rollout, verify the GitHub build provenance for the exact
      # digests just pushed. If verification fails the job stops here and NOTHING
      # is deployed — Terraform apply / ECS roll only run on a verified image.
      #
      # Method: `gh attestation verify` against the GitHub attestations API
      # (where `actions/attest-build-provenance` stored the provenance above).
      # ECR GovCloud does not host the GH attestations API, so verification uses
      # the API rather than registry-side attestations. The `oci://...@<digest>`
      # subject is resolved by gh from the registry; the runner is already
      # authenticated to ECR (amazon-ecr-login above), so gh can read the
      # manifest. `gh` is preinstalled on ubuntu-latest GitHub-hosted runners.
      #
      # ASSUMPTIONS (need a real Actions run to confirm):
      #   - `gh attestation verify` (GitHub CLI >= 2.49) is available on the
      #     runner image. If a pinned/older runner lacks it, add a `gh extension`
      #     / CLI install step.
      #   - the GITHUB_TOKEN has attestations:read (granted below) and can read
      #     the org's attestations.
      #   - gh can pull the OCI subject from ECR GovCloud using the ambient
      #     docker credential helper. If the GovCloud registry endpoint is not
      #     reachable by gh's OCI resolver, switch to verifying by
      #     `--digest-alg sha256` with a locally re-pulled digest, or use
      #     `cosign verify-attestation` against the buildx provenance on the image.
      - name: Verify build provenance (gate) — backend
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE: ${{ steps.ecr.outputs.registry }}/sentinel-qms/backend
          DIGEST: ${{ steps.build-backend.outputs.digest }}
        run: |
          echo "Verifying provenance for ${IMAGE}@${DIGEST}"
          gh attestation verify "oci://${IMAGE}@${DIGEST}" \
            --owner "${{ github.repository_owner }}"
          echo "Backend image provenance verified."

      - name: Verify build provenance (gate) — frontend
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE: ${{ steps.ecr.outputs.registry }}/sentinel-qms/frontend
          DIGEST: ${{ steps.build-frontend.outputs.digest }}
        run: |
          echo "Verifying provenance for ${IMAGE}@${DIGEST}"
          gh attestation verify "oci://${IMAGE}@${DIGEST}" \
            --owner "${{ github.repository_owner }}"
          echo "Frontend image provenance verified."

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: "1.9.5"

      - name: Terraform init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -input=false

      - name: Terraform plan
        working-directory: ${{ env.TF_DIR }}
        env:
          TF_VAR_oidc_client_secret: ${{ secrets.OIDC_CLIENT_SECRET }}
          TF_VAR_backend_image: ${{ steps.ecr.outputs.registry }}/sentinel-qms/backend:${{ steps.tag.outputs.tag }}
          TF_VAR_frontend_image: ${{ steps.ecr.outputs.registry }}/sentinel-qms/frontend:${{ steps.tag.outputs.tag }}
        run: terraform plan -input=false -out=tfplan

      - name: Terraform apply
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -input=false -auto-approve tfplan

      - name: Run database migrations + roll deployment
        env:
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
        working-directory: ${{ env.TF_DIR }}
        run: |
          CLUSTER=$(terraform output -raw ecs_cluster_name)
          BE=$(terraform output -raw backend_service_name)
          FE=$(terraform output -raw frontend_service_name)
          TASK_DEF=$(aws ecs describe-services --cluster "$CLUSTER" --services "$BE" \
            --query 'services[0].taskDefinition' --output text)
          NETCFG=$(aws ecs describe-services --cluster "$CLUSTER" --services "$BE" \
            --query 'services[0].networkConfiguration' --output json)
          aws ecs run-task --cluster "$CLUSTER" --task-definition "$TASK_DEF" \
            --launch-type FARGATE --network-configuration "$NETCFG" \
            --overrides '{"containerOverrides":[{"name":"backend","command":["alembic","upgrade","head"]}]}'
          aws ecs update-service --cluster "$CLUSTER" --service "$BE" --force-new-deployment >/dev/null
          aws ecs update-service --cluster "$CLUSTER" --service "$FE" --force-new-deployment >/dev/null

      - name: Wait for services to stabilize
        working-directory: ${{ env.TF_DIR }}
        run: |
          CLUSTER=$(terraform output -raw ecs_cluster_name)
          aws ecs wait services-stable --cluster "$CLUSTER" \
            --services "$(terraform output -raw backend_service_name)" \
                       "$(terraform output -raw frontend_service_name)"
