# External Secrets Operator — syncs AWS Secrets Manager into a k8s Secret.
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets-manager
  namespace: sentinel-qms
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-gov-west-1
      auth:
        jwt:
          serviceAccountRef:
            name: sentinel-backend
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: sentinel-backend-secrets
  namespace: sentinel-qms
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: sentinel-backend-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: sentinel-qms-prod/DATABASE_URL
    - secretKey: JWT_SECRET
      remoteRef:
        key: sentinel-qms-prod/JWT_SECRET
    - secretKey: OIDC_CLIENT_SECRET
      remoteRef:
        key: sentinel-qms-prod/OIDC_CLIENT_SECRET
