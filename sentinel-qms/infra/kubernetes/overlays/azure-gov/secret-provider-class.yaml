# Secrets Store CSI Driver — mounts Key Vault secrets and syncs them to a
# k8s Secret consumed by the backend Deployment via secretKeyRef.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: sentinel-backend-kv
  namespace: sentinel-qms
spec:
  provider: azure
  secretObjects:
    - secretName: sentinel-backend-secrets
      type: Opaque
      data:
        - objectName: database-url
          key: DATABASE_URL
        - objectName: jwt-secret
          key: JWT_SECRET
        - objectName: oidc-client-secret
          key: OIDC_CLIENT_SECRET
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: "00000000-0000-0000-0000-000000000000"
    keyvaultName: "sentinelqmskv"
    cloudName: "AzureUSGovernmentCloud"
    tenantId: "00000000-0000-0000-0000-000000000000"
    objects: |
      array:
        - |
          objectName: database-url
          objectType: secret
        - |
          objectName: jwt-secret
          objectType: secret
        - |
          objectName: oidc-client-secret
          objectType: secret
