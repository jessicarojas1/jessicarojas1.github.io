# =============================================================================
# PLACEHOLDER secret — DO NOT put real values here.
#
# In production these keys are injected by the External Secrets Operator or
# Secrets Store CSI Driver from AWS Secrets Manager / Azure Key Vault (see the
# overlay patches). This stub exists so kustomize/helm renders and local kind
# clusters can run. Replace with a SealedSecret or external-secret in real envs.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: sentinel-backend-secrets
  namespace: sentinel-qms
  labels:
    app.kubernetes.io/name: sentinel-qms
    app.kubernetes.io/component: backend
type: Opaque
stringData:
  # Overwritten by external secret store in cloud environments.
  DATABASE_URL: "postgresql+psycopg://sentinel:REPLACE_ME@localhost:5432/sentinel_qms?sslmode=require"
  JWT_SECRET: "REPLACE_ME_MIN_32_CHARS_FROM_SECRET_STORE"
  OIDC_CLIENT_SECRET: "REPLACE_ME_FROM_SECRET_STORE"
