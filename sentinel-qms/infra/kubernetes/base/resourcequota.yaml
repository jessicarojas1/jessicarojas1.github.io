apiVersion: v1
kind: ResourceQuota
metadata:
  name: sentinel-qms-quota
  namespace: sentinel-qms
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "12"
    limits.memory: 16Gi
    pods: "40"
    services: "10"
    persistentvolumeclaims: "4"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: sentinel-qms-limits
  namespace: sentinel-qms
spec:
  limits:
    - type: Container
      default:
        cpu: "500m"
        memory: 512Mi
      defaultRequest:
        cpu: "100m"
        memory: 128Mi
      max:
        cpu: "2"
        memory: 2Gi
