apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "sentinel-qms.fullname" . }}-config
  labels:
    {{- include "sentinel-qms.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
data:
  {{- range $key, $value := .Values.config }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
