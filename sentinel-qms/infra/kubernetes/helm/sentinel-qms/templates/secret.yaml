{{- if not .Values.secrets.externalSecrets.enabled }}
# Placeholder Secret — only rendered when an external secret store is NOT used.
# Supply real values via --set or a SealedSecret; never commit production values.
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.secretName }}
  labels:
    {{- include "sentinel-qms.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
type: Opaque
stringData:
  {{- range $key, $value := .Values.secrets.values }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
