# ─────────────────────────────────────────────────────────────────────────────
# Sentinel QMS — Local full-stack development environment
#
#   postgres   : PostgreSQL 16 (database: sentinel_qms)
#   minio      : Local S3-compatible object store (mimics AWS S3 for uploads)
#   minio-init : One-shot job that creates the bucket
#   backend    : FastAPI API (gunicorn/uvicorn) on :8000
#   frontend   : React SPA served by nginx on :8080
#
# Usage:
#   cp .env.example .env   # then edit secrets
#   docker compose up --build
#
# NOTE: This file is for LOCAL development only. Production deploys use the
#       Terraform stacks under terraform/ and the Kubernetes manifests under
#       kubernetes/. Do not use these credentials anywhere but localhost.
# ─────────────────────────────────────────────────────────────────────────────
name: sentinel-qms

services:
  postgres:
    image: postgres:16-alpine@sha256:e013e867e712fec275706a6c51c966f0bb0c93cfa8f51000f85a15f9865a28cb  # postgres:16-alpine
    container_name: sentinel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sentinel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_local_only}
      POSTGRES_DB: ${POSTGRES_DB:-sentinel_qms}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sentinel} -d ${POSTGRES_DB:-sentinel_qms}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - sentinel

  minio:
    image: minio/minio:latest@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e  # minio/minio:latest
    container_name: sentinel-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin_local_only}
    ports:
      - "127.0.0.1:9000:9000"   # S3 API
      - "127.0.0.1:9001:9001"   # Web console
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - sentinel

  # One-shot container that provisions the bucket then exits.
  minio-init:
    image: minio/mc:latest@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727  # minio/mc:latest
    container_name: sentinel-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin_local_only} &&
      mc mb --ignore-existing local/${S3_BUCKET:-sentinel-qms-uploads} &&
      mc version enable local/${S3_BUCKET:-sentinel-qms-uploads} &&
      mc anonymous set none local/${S3_BUCKET:-sentinel-qms-uploads} &&
      echo 'minio bucket ready' &&
      exit 0
      "
    networks:
      - sentinel

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: sentinel-qms/backend:local
    container_name: sentinel-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-sentinel}:${POSTGRES_PASSWORD:-change_me_local_only}@postgres:5432/${POSTGRES_DB:-sentinel_qms}
      JWT_SECRET: ${JWT_SECRET:-local-dev-secret-not-for-production-min-32-chars}
      JWT_ALGORITHM: HS256
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080}
      OIDC_ISSUER: ${OIDC_ISSUER:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      # Use MinIO as a local S3 endpoint.
      STORAGE_BACKEND: ${STORAGE_BACKEND:-s3}
      S3_BUCKET: ${S3_BUCKET:-sentinel-qms-uploads}
      S3_REGION: ${S3_REGION:-us-gov-west-1}
      S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin_local_only}
      AWS_EC2_METADATA_DISABLED: "true"
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - sentinel

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        # Relative path: the SPA calls /api/v1/* and nginx proxies it to the
        # backend service (see frontend/nginx.conf), avoiding cross-origin calls.
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
    image: sentinel-qms/frontend:local
    container_name: sentinel-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - sentinel

networks:
  sentinel:
    driver: bridge

volumes:
  pgdata:
    driver: local
  miniodata:
    driver: local
