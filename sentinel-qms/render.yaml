# ─────────────────────────────────────────────────────────────────────────────
# Sentinel QMS — Render Blueprint (single web service, DEMO)
#
# ONE Docker web service (FastAPI serves both the /api/v1 API and the React SPA)
# plus a PostgreSQL database. Same-origin, so no CORS or cross-service URLs.
#
# This is a DEMO profile (free plans; runs in development mode so a login is
# seeded; ephemeral local file storage). For CUI / production, deploy to AWS
# GovCloud or Azure Government with the Terraform in infra/ — see docs/deployment/.
#
# Paths assume this file is at the REPOSITORY ROOT. Easiest way to get there:
#     ./scripts/extract-to-standalone-repo.sh
# (Deploying from the portfolio monorepo instead? Add `rootDir: sentinel-qms`
#  to the service so the Docker build context includes frontend/ and backend/.)
#
# A two-service variant (separate API + nginx frontend) is documented in
# docs/deployment/render-demo.md.
# ─────────────────────────────────────────────────────────────────────────────

databases:
  - name: sentinel-qms-db
    plan: free
    databaseName: sentinel_qms
    user: sentinel

services:
  - type: web
    name: sentinel-qms
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sentinel-qms-db
          property: connectionString
      - key: DB_SCHEMA
        value: sentinel_qms          # isolate tables (safe on a shared database)
      - key: JWT_SECRET
        generateValue: true
      - key: ENVIRONMENT
        value: development          # DEMO ONLY — enables the seeded admin login
      - key: LOG_LEVEL
        value: INFO
      - key: WEB_CONCURRENCY
        value: "2"                  # keep gunicorn within the 512 MB free instance
      - key: STORAGE_BACKEND
        value: local                # uploads live on ephemeral disk in the demo
      - key: AUTO_MIGRATE
        value: "1"
      - key: AUTO_SEED
        value: "1"
      - key: ADMIN_AUTO_CREATE
        value: "true"
      # ADMIN_EMAIL and ADMIN_PASSWORD are intentionally NOT defined here — set
      # them as secrets in the Render dashboard (Environment). No admin
      # credentials are committed to the repo; if unset, admin bootstrap is
      # skipped rather than falling back to a baked-in default.
