services:
  - type: web
    name: cmmc-compliance-agent
    runtime: python            # Python runtime; see docker alternative below
    rootDir: cmmc-agent
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    plan: free
    healthCheckPath: /api/dashboard   # returns JSON, no ANTHROPIC_API_KEY required
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false            # set manually in the Render dashboard / secret store
      - key: PORT
        value: 10000           # Render routes traffic to this port

