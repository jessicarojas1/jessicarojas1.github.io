services:
  - type: web
    name: nexus
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nexus-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: APP_ENV
        value: production
      - key: APEX_ALLOW_DEFAULT_PINS
        value: "1"

databases:
  - name: nexus-db
    plan: free
    databaseName: nexus
    user: nexus
