# Teacher Hub — hardened nginx server block (used by ../Dockerfile).
# Serves the static site on 8080 (non-root) and adds the security response
# headers + Content-Security-Policy the HTML does not ship itself.
#
# CSP note: script-src is strict ('self' + jsDelivr, NO 'unsafe-inline') — all app
# logic is externalized to app.js / theme-init.js / branding.js and every handler
# is a data-* attribute wired by delegated addEventListener. style-src keeps
# 'unsafe-inline' because the app still uses inline style="" attributes + a <style>
# block. This mirrors the <meta> CSP shipped in index.html.
# See docs/SECURITY.md and OPEN_ITEMS.md.

server {
    listen       8080;
    server_name  _;
    root         /usr/share/nginx/html;
    index        teacher/index.html;

    # Redirect apex to the hub.
    location = / { return 302 /teacher/; }

    # --- Security response headers ---
    add_header Content-Security-Policy
      "default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; font-src 'self' https://cdn.jsdelivr.net; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "DENY" always;
    add_header Referrer-Policy        "no-referrer" always;
    add_header Permissions-Policy     "geolocation=(), microphone=(), camera=()" always;

    # --- Caching: HTML short, static assets long ---
    location = /teacher/index.html { add_header Cache-Control "no-cache"; }
    location ~* \.(css|js|ico|png|svg|woff2?)$ {
        add_header Cache-Control "public, max-age=604800";
    }

    location / { try_files $uri $uri/ =404; }
}
