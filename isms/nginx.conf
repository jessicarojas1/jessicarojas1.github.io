# ISMS Document Library — nginx server block (static hosting)
# Paired with isms/Dockerfile (nginx-unprivileged, listens on 8080).
server {
    listen       8080;
    listen       [::]:8080;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # ---- Security headers -----------------------------------------------------
    # The site is 100% client-side. No cookies, no PII leaves the browser.
    # This image serves ONLY the ISMS pages (+ shared parent JS/CSS). Their scripts
    # are now fully external (theme-init.js, hub.js, branding.js, parent scripts) and
    # Print buttons use data-print + a delegated handler — so script-src no longer
    # needs 'unsafe-inline'. Each HTML page also ships a matching CSP <meta>.
    # style-src keeps 'unsafe-inline' for inline style= and branding accent styles.
    # CSP allows self + the jsDelivr CDN (Bootstrap CSS/JS + devicon SVGs). Tighten
    # further by vendoring assets (see deployments/AIRGAPPED.md).
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data: https://cdn.jsdelivr.net; font-src 'self' https://cdn.jsdelivr.net; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ---- Compression ----------------------------------------------------------
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # ---- Cache policy ---------------------------------------------------------
    # HTML is small and revised often → revalidate. CSS/JS → long cache.
    location ~* \.html$ {
        add_header Cache-Control "no-cache";
    }
    location ~* \.(css|js|svg|ico|png|jpg|jpeg|gif|webp)$ {
        add_header Cache-Control "public, max-age=604800";
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
