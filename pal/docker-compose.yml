# PAL Platform — local / on-prem multi-container deployment.
# For production, supply secrets via your orchestrator's secret store
# (Azure Key Vault, AWS Secrets Manager, K8s Secrets) rather than .env.
services:
  app:
    build: .
    image: pal-platform:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_NAME: ${APP_NAME:-PAL Platform}
      APP_ENV: ${APP_ENV:-production}
      APP_URL: ${APP_URL:-http://localhost:8080}
      DATABASE_URL: postgres://${DB_USER:-pal}:${DB_PASS:-pal}@db:5432/${DB_NAME:-pal}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      TRUSTED_PROXY_IPS: ${TRUSTED_PROXY_IPS:-127.0.0.1}
      STORAGE_DRIVER: ${STORAGE_DRIVER:-local}
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - pal_uploads:/var/www/html/uploads
      - pal_logs:/var/www/html/logs
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-pal}
      POSTGRES_USER: ${DB_USER:-pal}
      POSTGRES_PASSWORD: ${DB_PASS:-pal}
    volumes:
      - pal_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-pal}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pal_pgdata:
  pal_uploads:
  pal_logs:
