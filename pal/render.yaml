services:
  - type: web
    name: pal-platform
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pal-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: APP_ENV
        value: production
      - key: APP_NAME
        value: PAL Platform
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: APP_URL
        sync: false

databases:
  - name: pal-db
    plan: free
    databaseName: pal
    user: pal
