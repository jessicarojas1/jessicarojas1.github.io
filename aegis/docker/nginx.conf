server {
    listen 80;
    server_name _;
    root /var/www/aegis;
    index index.php;

    # Security headers (complement PHP-set headers)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Block sensitive paths
    location ~ ^/(config|src|database|scripts|\.env|\.git) {
        return 403;
    }

    # Serve public assets directly
    location /public/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # PHP via FastCGI
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_param PHP_VALUE "upload_max_filesize=50M\npost_max_size=52M";
        fastcgi_read_timeout 60;
        # Prevent PHP source disclosure
        fastcgi_param HTTP_PROXY "";
    }

    # Block uploads directory from direct access
    location /uploads/ {
        return 403;
    }

    client_max_body_size 55M;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
}
