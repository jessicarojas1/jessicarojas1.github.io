upstream aegis_app {
    server app:80;
    keepalive 32;
}

# ── TLS / HSTS ──────────────────────────────────────────────────────────────
# This config listens on :80 for the common deployment where TLS is terminated
# UPSTREAM (Render/ALB/Cloudflare/ingress) and the app trusts X-Forwarded-Proto.
# In that model HSTS is set by the app (see src/Security.php, gated on the
# forwarded scheme) so it is not duplicated here. To terminate TLS AT nginx
# instead, uncomment the 443 server block below and the HTTP->HTTPS redirect,
# and mount certs at /etc/nginx/ssl (already wired in docker-compose.yml).
#
# server {
#     listen 443 ssl http2;
#     server_name _;
#     ssl_certificate     /etc/nginx/ssl/fullchain.pem;
#     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
#     ssl_protocols       TLSv1.2 TLSv1.3;
#     ssl_ciphers         HIGH:!aNULL:!MD5;
#     add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
#     ... (same location blocks as below) ...
# }
# server { listen 80; server_name _; return 301 https://$host$request_uri; }

server {
    listen 80;
    server_name _;
    client_max_body_size 55M;

    # ── Static security headers ──────────────────────────────────────────────
    # Mirrors aegis/.htaccess. Applied at the perimeter so directly-served
    # /public/ static assets (which bypass PHP-Apache) are also covered. The
    # nonce-based Content-Security-Policy is set per-request by PHP (Security.php)
    # for dynamic responses; a strict static CSP is added to the /public/ block
    # below since those responses never reach PHP.
    # NOTE: the deprecated X-XSS-Protection header is intentionally omitted —
    # modern guidance (OWASP/CISA) relies on the CSP instead.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    # Serve static assets directly (bypass PHP-Apache)
    location /public/ {
        alias /var/www/html/public/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        # Re-declare perimeter headers (a location-level add_header resets
        # inherited ones) plus a strict CSP for these PHP-less responses.
        add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob: https:; style-src 'self' 'unsafe-inline'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        gzip_static on;
        access_log off;
    }

    # Block install script at the network perimeter
    location = /install.php {
        deny all;
        return 403;
    }

    # Block uploads / sensitive paths
    location ~* ^/(uploads|config|src|database|scripts|\.env|\.git) {
        deny all;
        return 403;
    }

    # All other requests → PHP-Apache container
    location / {
        proxy_pass          http://aegis_app;
        proxy_http_version  1.1;
        proxy_set_header    Connection        "";
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  120s;
        proxy_buffer_size       16k;
        proxy_buffers           8 16k;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
