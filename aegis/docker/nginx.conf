upstream aegis_app {
    server app:80;
    keepalive 32;
}

server {
    listen 80;
    server_name _;
    client_max_body_size 55M;

    # Serve static assets directly (bypass PHP-Apache)
    location /public/ {
        alias /var/www/html/public/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        gzip_static on;
        access_log off;
    }

    # Block install script at the network perimeter
    location = /install.php {
        deny all;
        return 403;
    }

    # Block uploads / sensitive paths
    location ~* ^/(uploads|config|src|database|scripts|\.env|\.git) {
        deny all;
        return 403;
    }

    # All other requests → PHP-Apache container
    location / {
        proxy_pass          http://aegis_app;
        proxy_http_version  1.1;
        proxy_set_header    Connection        "";
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  120s;
        proxy_buffer_size       16k;
        proxy_buffers           8 16k;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
