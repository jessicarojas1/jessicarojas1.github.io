name: Build & Deploy to Azure

on:
  push:
    branches: [main]
    paths:
      - 'aegis/**'
      - '.github/workflows/azure-deploy.yml'
  workflow_dispatch:

env:
  ACR_NAME: ${{ vars.ACR_NAME }}           # e.g. aegisacr
  ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER }} # e.g. aegisacr.azurecr.io
  IMAGE_NAME: aegis
  CONTAINER_APP_NAME: ${{ vars.CONTAINER_APP_NAME }} # e.g. aegis-app
  CONTAINER_APP_ENV: ${{ vars.CONTAINER_APP_ENV }}   # e.g. aegis-env
  RESOURCE_GROUP: ${{ vars.RESOURCE_GROUP }}         # e.g. aegis-rg

jobs:
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write       # OIDC: Azure login + GH attestation signing
      attestations: write   # actions/attest-build-provenance (GH attestations API)
    # Expose the pushed digest + image ref so the deploy job can verify the
    # exact artifact (by digest, not a mutable tag) before promoting it.
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      image: ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}
      tag: ${{ steps.tag.outputs.TAG }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Azure Login (OIDC)
        uses: azure/login@1384c340ab2dda50fed2bee3041d1d87018aa5e8 # v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name $ACR_NAME

      - name: Set image tag
        id: tag
        run: echo "TAG=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Build & push
        id: build
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: ./aegis
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.TAG }}
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
          cache-to: type=inline
          # Supply-chain attestations: keyless SLSA build provenance + SPDX SBOM
          # attached to the pushed image (OIDC via the job's id-token: write).
          provenance: true
          sbom: true

      # Mint a GitHub-native (SLSA) build-provenance attestation keyed off the
      # pushed digest, stored in the GitHub attestations API so the deploy job's
      # verify gate can confirm it with `gh attestation verify`. Without this
      # step the buildx provenance lives only on the image; this gives a
      # registry-independent, verifiable record bound to this workflow run.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2
        with:
          subject-name: ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}

  deploy:
    name: Deploy to Container Apps
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      id-token: write       # OIDC: Azure login
      contents: read        # gh attestation verify
      attestations: read    # gh attestation verify reads the GH attestations API

    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@1384c340ab2dda50fed2bee3041d1d87018aa5e8 # v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name $ACR_NAME

      - name: Set image tag
        id: tag
        run: echo "TAG=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      # ---------------------------------------------------------------------
      # SLSA VERIFY-BEFORE-PROMOTE GATE (fail-closed).
      # Verify the GitHub build provenance for the exact digest built by the
      # build-and-push job BEFORE `az containerapp update` promotes it. If
      # verification fails the job stops and the Container App is never updated.
      #
      # Method: `gh attestation verify` against the GitHub attestations API,
      # using the digest passed via job outputs (verifies the artifact, not a
      # mutable tag). The runner authenticates to ACR (az acr login above) so gh
      # can resolve the oci:// subject. `gh` is preinstalled on ubuntu-latest.
      #
      # ASSUMPTIONS (need a real Actions run to confirm):
      #   - `gh attestation verify` (GitHub CLI >= 2.49) is on the runner image.
      #   - GITHUB_TOKEN has attestations:read (granted on this job).
      #   - gh can pull the OCI subject from ACR via the ambient docker
      #     credential helper; if not, fall back to `cosign verify-attestation`
      #     on the buildx provenance attached to the image.
      - name: Verify build provenance (gate)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE: ${{ needs.build-and-push.outputs.image }}
          DIGEST: ${{ needs.build-and-push.outputs.digest }}
        run: |
          echo "Verifying provenance for ${IMAGE}@${DIGEST}"
          gh attestation verify "oci://${IMAGE}@${DIGEST}" \
            --owner "${{ github.repository_owner }}"
          echo "Image provenance verified — proceeding to promote."

      - name: Update Container App
        run: |
          az containerapp update \
            --name $CONTAINER_APP_NAME \
            --resource-group $RESOURCE_GROUP \
            --image $ACR_LOGIN_SERVER/$IMAGE_NAME:${{ steps.tag.outputs.TAG }}

      - name: Verify deployment
        run: |
          URL=$(az containerapp show \
            --name $CONTAINER_APP_NAME \
            --resource-group $RESOURCE_GROUP \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "App URL: https://$URL"
          curl -sf "https://$URL/health" && echo "Health check passed" || echo "Health check failed"
