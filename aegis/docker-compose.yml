version: '3.8'
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aegis_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-aegis}
      - DB_USER=${DB_USER:-aegis}
      - DB_PASS=${DB_PASS}
      - APP_URL=${APP_URL:-http://localhost}
      - APP_ENV=${APP_ENV:-production}
    volumes:
      - uploads_data:/var/www/aegis/uploads
      - ./logs:/var/log/aegis
    networks:
      - aegis_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  db:
    image: postgres:16-alpine
    container_name: aegis_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-aegis}
      POSTGRES_USER: ${DB_USER:-aegis}
      POSTGRES_PASSWORD: ${DB_PASS}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./database/migrations/001_enterprise_phase1.sql:/docker-entrypoint-initdb.d/02_migration1.sql
      - ./database/migrations/002_phase2.sql:/docker-entrypoint-initdb.d/03_migration2.sql
      - ./database/migrations/003_phase3.sql:/docker-entrypoint-initdb.d/04_migration3.sql
    networks:
      - aegis_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-aegis} -d ${DB_NAME:-aegis}"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: aegis_nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/aegis/public:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
    networks:
      - aegis_net

  cron:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aegis_cron
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-aegis}
      - DB_USER=${DB_USER:-aegis}
      - DB_PASS=${DB_PASS}
    volumes:
      - uploads_data:/var/www/aegis/uploads
      - ./logs:/var/log/aegis
    command: /bin/sh -c "while true; do
        php /var/www/aegis/scripts/run_workflows.php >> /var/log/aegis/workflows.log 2>&1;
        php /var/www/aegis/scripts/dispatch_webhooks.php >> /var/log/aegis/webhooks.log 2>&1;
        sleep 60;
      done"
    networks:
      - aegis_net

volumes:
  pg_data:
  uploads_data:

networks:
  aegis_net:
    driver: bridge
