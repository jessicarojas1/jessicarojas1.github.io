version: '3.8'

services:
  app:
    build: .
    ports:
      - "8080:80"
    environment:
      - DATABASE_URL=postgresql://aegis:aegis@db:5432/aegis
      - JWT_SECRET=dev-secret-change-in-production
      - APP_ENV=development
      - APP_NAME=AEGIS GRC
      - ADMIN_EMAIL=admin@aegisgrc.local
      - ADMIN_PASSWORD=Admin@aegis1!
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/var/www/html

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=aegis
      - POSTGRES_USER=aegis
      - POSTGRES_PASSWORD=aegis
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegis"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
