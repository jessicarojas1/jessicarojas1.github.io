version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aegis_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-aegis}
      - DB_USER=${DB_USER:-aegis}
      - DB_PASS=${DB_PASS}
      - APP_URL=${APP_URL:-http://localhost}
      - APP_ENV=${APP_ENV:-production}
      - JWT_SECRET=${JWT_SECRET}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - STORAGE_DRIVER=${STORAGE_DRIVER:-local}
    volumes:
      - uploads_data:/var/www/html/uploads
      - logs_data:/var/www/html/logs
    networks:
      - frontend_net
      - backend_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  db:
    image: postgres:16-alpine
    container_name: aegis_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-aegis}
      POSTGRES_USER: ${DB_USER:-aegis}
      POSTGRES_PASSWORD: ${DB_PASS}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./database/migrations/001_enterprise_phase1.sql:/docker-entrypoint-initdb.d/02_migration1.sql
      - ./database/migrations/002_phase2.sql:/docker-entrypoint-initdb.d/03_migration2.sql
      - ./database/migrations/003_phase3.sql:/docker-entrypoint-initdb.d/04_migration3.sql
    networks:
      - backend_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-aegis} -d ${DB_NAME:-aegis}"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: aegis_nginx
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/html/public:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
    networks:
      - frontend_net

  cron:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aegis_cron
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-aegis}
      - DB_USER=${DB_USER:-aegis}
      - DB_PASS=${DB_PASS}
      - APP_URL=${APP_URL:-http://localhost}
      - APP_ENV=${APP_ENV:-production}
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - uploads_data:/var/www/html/uploads
      - logs_data:/var/www/html/logs
    command: /bin/sh -c "while true; do
        php /var/www/html/scripts/run_workflows.php >> /var/www/html/logs/workflows.log 2>&1;
        php /var/www/html/scripts/dispatch_webhooks.php >> /var/www/html/logs/webhooks.log 2>&1;
        sleep 60;
      done"
    networks:
      - backend_net

volumes:
  pg_data:
  uploads_data:
  logs_data:

networks:
  frontend_net:
    driver: bridge
  backend_net:
    driver: bridge
