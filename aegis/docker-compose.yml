version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aegis_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-aegis}
      - DB_USER=${DB_USER:-aegis}
      - DB_PASS=${DB_PASS:?DB_PASS is required}
      - APP_URL=${APP_URL:-http://localhost}
      - APP_ENV=${APP_ENV:-production}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      # Dedicated cryptographic keys (key separation — NIST SC-12). Fall back to
      # JWT_SECRET-derived keys when unset, but set distinct values in production.
      - AUDIT_HMAC_KEY=${AUDIT_HMAC_KEY:-}
      - APP_ENCRYPTION_KEY=${APP_ENCRYPTION_KEY:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - STORAGE_DRIVER=${STORAGE_DRIVER:-local}
    volumes:
      - uploads_data:/var/www/html/uploads
      - logs_data:/var/www/html/logs
    networks:
      - frontend_net
      - backend_net
    # Container hardening (CIS Docker Benchmark 5.x): block privilege escalation
    # and cap resources to limit blast radius / resource-exhaustion DoS.
    security_opt:
      - no-new-privileges:true
    mem_limit: 512m
    cpus: 1.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  db:
    image: postgres:16-alpine@sha256:e013e867e712fec275706a6c51c966f0bb0c93cfa8f51000f85a15f9865a28cb  # postgres:16-alpine
    container_name: aegis_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-aegis}
      POSTGRES_USER: ${DB_USER:-aegis}
      POSTGRES_PASSWORD: ${DB_PASS:?DB_PASS is required}
    volumes:
      - pg_data:/var/lib/postgresql/data
      # Apply schema + ALL migrations in order on first boot (see docker/initdb.sh).
      - ./database:/aegis-db:ro
      - ./docker/initdb.sh:/docker-entrypoint-initdb.d/00-init.sh:ro
    networks:
      - backend_net
    security_opt:
      - no-new-privileges:true
    mem_limit: 1g
    cpus: 1.0
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-aegis} -d ${DB_NAME:-aegis}"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:1.27-alpine@sha256:65645c7bb6a0661892a8b03b89d0743208a18dd2f3f17a54ef4b76fb8e2f2a10  # nginx:1.27-alpine
    container_name: aegis_nginx
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/html/public:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
    networks:
      - frontend_net
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m
    cpus: 0.5

  cron:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aegis_cron
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-aegis}
      - DB_USER=${DB_USER:-aegis}
      - DB_PASS=${DB_PASS:?DB_PASS is required}
      - APP_URL=${APP_URL:-http://localhost}
      - APP_ENV=${APP_ENV:-production}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - AUDIT_HMAC_KEY=${AUDIT_HMAC_KEY:-}
      - APP_ENCRYPTION_KEY=${APP_ENCRYPTION_KEY:-}
    volumes:
      - uploads_data:/var/www/html/uploads
      - logs_data:/var/www/html/logs
    # CLI worker needs no privileges — run as the non-root web user, drop all
    # Linux capabilities, and block privilege escalation (CIS Docker 4.1/5.x).
    user: www-data
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m
    cpus: 0.5
    command: /bin/sh -c "while true; do
        php /var/www/html/scripts/run_workflows.php >> /var/www/html/logs/workflows.log 2>&1;
        php /var/www/html/scripts/dispatch_webhooks.php >> /var/www/html/logs/webhooks.log 2>&1;
        sleep 60;
      done"
    networks:
      - backend_net

volumes:
  pg_data:
  uploads_data:
  logs_data:

networks:
  frontend_net:
    driver: bridge
  backend_net:
    driver: bridge
