services:
  db:
    image: postgres:16-alpine@sha256:e013e867e712fec275706a6c51c966f0bb0c93cfa8f51000f85a15f9865a28cb  # postgres:16-alpine
    environment:
      POSTGRES_DB: apex
      POSTGRES_USER: apex
      # Required — the stack refuses to start unless DB_PASS is supplied.
      POSTGRES_PASSWORD: ${DB_PASS:?DB_PASS is required}
    # Bind to loopback only — do NOT expose the database on all host
    # interfaces (0.0.0.0). Local tooling can still reach 127.0.0.1:5432.
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    ports:
      # Container now listens on 8080 as the non-root www-data user.
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://apex:${DB_PASS:?DB_PASS is required}@db:5432/apex
      # This file sets APP_ENV=development, the ONLY mode where a non-secret JWT
      # key is tolerated (see Auth.php, which fails closed in production). Never
      # deploy this compose as-is. JWT_SECRET is required even locally so the
      # stack refuses to start without an explicitly supplied value.
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      APP_ENV: development
      APEX_ALLOW_DEFAULT_PINS: "${APEX_ALLOW_DEFAULT_PINS:-0}"
    depends_on:
      - db
    volumes:
      - .:/var/www/html

volumes:
  pgdata:
