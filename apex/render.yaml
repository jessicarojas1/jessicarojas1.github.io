services:
  - type: web
    name: apex
    env: docker
    rootDir: apex
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: apex-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: APP_ENV
        value: production
      - key: APEX_ALLOW_DEFAULT_PINS
        value: "1"

databases:
  - name: apex-db
    plan: free
    databaseName: apex
    user: apex
