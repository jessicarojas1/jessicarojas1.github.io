name: CI

# PR-blocking CI for this heterogeneous monorepo. Each app gets its own job so a
# failure in one is isolated from the others. Jobs run in parallel.
on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. when a PR is pushed to again).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # CITADEL backend (Node/Express) + SPA bundle.
  # npm ci (has lockfile) -> node --check across server + js -> smoke test.
  # ---------------------------------------------------------------------------
  node-citadel:
    name: CITADEL (Node 20)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: citadel/server/package-lock.json

      - name: Install (npm ci)
        working-directory: citadel/server
        run: npm ci

      - name: Syntax check (node --check) server + js
        run: bash citadel/scripts/ci-node-check.sh

      - name: Lint (ESLint — correctness rules over js + server + scripts)
        working-directory: citadel/server
        run: npm run lint

      # A security scanner should scan itself: surface CVEs in CITADEL's own
      # production dependencies. GATING (security-scan policy): npm audit exits
      # non-zero on advisories at/above the level, failing the build. Threshold
      # = high (high/critical block; low/moderate are reported but don't fail).
      - name: Dependency audit (own prod deps, gating high+)
        working-directory: citadel/server
        run: npm audit --omit=dev --audit-level=high

      - name: Smoke test
        working-directory: citadel/server
        run: npm test

      # Validate the SARIF 2.1.0 exporter produces a structurally valid document
      # (schema/version, rules, results, levels, partialFingerprints, and a valid
      # fixes[] object) so code-scanning ingestion can't silently break.
      - name: SARIF export validation
        run: node citadel/scripts/validate-sarif.js

      # Accuracy gate: run the heuristic engine over the labeled benchmark corpus
      # and fail the build if detection recall or precision regress. Current run is
      # ~100% recall / ~95% precision; thresholds keep headroom while catching real
      # regressions in the rules or engine. No external deps (engine is vm-loaded).
      - name: Accuracy benchmark (gate)
        working-directory: citadel
        env:
          FAIL_UNDER_RECALL: '0.9'
          FAIL_UNDER_PRECISION: '0.9'
        run: node benchmark/run.js

  # ---------------------------------------------------------------------------
  # Sentinel QMS frontend (Vite React + TS).
  # npm ci -> typecheck (tsc --noEmit) -> vitest. Lint is non-blocking: the repo
  # currently ships no ESLint config, so `npm run lint` errors out (see note).
  # ---------------------------------------------------------------------------
  ts-sentinel:
    name: Sentinel QMS frontend (Node 20)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sentinel-qms/frontend/package-lock.json

      - name: Install (npm ci)
        working-directory: sentinel-qms/frontend
        run: npm ci

      - name: Typecheck
        working-directory: sentinel-qms/frontend
        run: npm run typecheck

      - name: Test (vitest)
        working-directory: sentinel-qms/frontend
        run: npm run test

      # Non-blocking: no eslint config in the repo yet, so lint currently fails.
      # Once a flat/legacy ESLint config is added, drop continue-on-error.
      - name: Lint (non-blocking)
        working-directory: sentinel-qms/frontend
        continue-on-error: true
        run: npm run lint

  # ---------------------------------------------------------------------------
  # Compliance Copilot (Next.js + TS). npm ci (has lockfile) -> tsc --noEmit.
  # ---------------------------------------------------------------------------
  ts-compliance:
    name: Compliance Copilot (Node 20)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: compliance-copilot/package-lock.json

      - name: Install (npm ci)
        working-directory: compliance-copilot
        run: npm ci

      - name: Typecheck (tsc --noEmit)
        working-directory: compliance-copilot
        run: npx tsc --noEmit

  # ---------------------------------------------------------------------------
  # PHP lint (php -l) over every .php in aegis/ and apex/. Parallel via xargs.
  # ---------------------------------------------------------------------------
  php-lint:
    name: PHP lint (8.2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: shivammathur/setup-php@b604ade2a87db23f8871b7182e69ec5e75effb45 # v2
        with:
          php-version: '8.2'
          tools: none
          coverage: none

      - name: Lint all .php in aegis/ and apex/
        run: |
          find aegis apex -name '*.php' -print0 \
            | xargs -0 -r -n1 -P4 php -l

  # ---------------------------------------------------------------------------
  # AEGIS framework-free test suite + migration integrity verifier.
  # No database required: tests cover pure logic (SSRF guard, JWT, RiskScore,
  # AIAdvisor redaction) and the verifier statically checks migration registration.
  # ---------------------------------------------------------------------------
  aegis-tests:
    name: AEGIS tests (8.2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: shivammathur/setup-php@b604ade2a87db23f8871b7182e69ec5e75effb45 # v2
        with:
          php-version: '8.2'
          tools: none
          coverage: none

      - name: Unit test suite
        working-directory: aegis
        run: php tests/run.php

      - name: Migration integrity verifier
        working-directory: aegis
        run: php scripts/verify_migrations.php

      - name: UI / CSP consistency linter
        working-directory: aegis
        run: php scripts/check_ui.php

      - name: Route authorization coverage
        working-directory: aegis
        run: php scripts/check_route_auth.php

      - name: CSRF coverage (POST routes)
        working-directory: aegis
        run: php scripts/check_csrf.php

      - name: Write-permission coverage (no write gated on a read permission)
        working-directory: aegis
        run: php scripts/check_write_permissions.php

      - name: CSV export safety
        working-directory: aegis
        run: php scripts/check_csv_export.php

  # ---------------------------------------------------------------------------
  # Python compile-check (py_compile) over the Streamlit dashboard, the Sentinel
  # FastAPI backend, and the other small Python apps. No heavy deps installed —
  # this only confirms the sources parse/compile.
  # ---------------------------------------------------------------------------
  py-lint:
    name: Python compile-check (3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: py_compile all .py (excluding caches)
        run: |
          find business-insight-dashboard sentinel-qms/backend aeromarkup cmmc-agent \
            -name '*.py' -not -path '*/__pycache__/*' -print0 \
            | xargs -0 -r python -m py_compile
          echo "py_compile passed"

  # ---------------------------------------------------------------------------
  # PALADIN — PHP lint over the whole app + framework-free security regression
  # tests (CSV/formula injection, SSRF guard, HTML sanitiser, output escaping).
  # ---------------------------------------------------------------------------
  paladin:
    name: PALADIN (PHP lint + security tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: shivammathur/setup-php@b604ade2a87db23f8871b7182e69ec5e75effb45 # v2
        with:
          php-version: '8.2'
          tools: none
          coverage: none

      - name: Lint all .php in paladin/
        run: |
          find paladin -name '*.php' -print0 \
            | xargs -0 -r -n1 -P4 php -l

      - name: Security regression tests
        run: php paladin/tests/security_test.php

  # ---------------------------------------------------------------------------
  # AEGIS supply-chain: SBOM (CycloneDX) + filesystem vulnerability scan.
  # SLSA / EO 14028 evidence. The scan is advisory (won't block on unfixable or
  # base-image transitive advisories); the SBOM is uploaded as a build artifact.
  # ---------------------------------------------------------------------------
  aegis-supply-chain:
    name: AEGIS supply chain (SBOM + scan)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Generate CycloneDX SBOM (Syft)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: ./aegis
          format: cyclonedx-json
          output-file: aegis-sbom.cyclonedx.json
          artifact-name: aegis-sbom.cyclonedx.json

      - name: Vulnerability scan (Trivy filesystem, gating)
        # GATING (security-scan policy): exit-code 1 on HIGH/CRITICAL with
        # ignore-unfixed:true, so the build fails on real, fixable dependency
        # vulnerabilities while unfixable base-image CVEs don't wedge it.
        # Pinned to a released tag rather than the mutable @master branch, so an
        # arbitrary upstream commit can't run in CI. trivy-action transitively
        # pulls aquasecurity/setup-trivy, and upstream keeps retagging/removing it
        # (0.24.0 -> stopped resolving; 0.28.0 -> setup-trivy@v0.2.1 was removed).
        # If action RESOLUTION breaks again, bump to a current release — that is a
        # tooling failure, not a vuln finding, and must be fixed (not silently
        # skipped) now that this gate is enforcing.
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: ./aegis
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: "1"

      - name: Hadolint (hardened Dockerfile)
        uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf # v3.1.0
        continue-on-error: true
        with:
          dockerfile: aegis/docker/Dockerfile.hardened
