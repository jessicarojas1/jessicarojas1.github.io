name: platform base-images (build · Trivy · cosign)

# Builds the two hardened base images (php-apache, node), scans them with Trivy
# (HARD gate on HIGH/CRITICAL OS/library CVEs), and — on a release tag — pushes
# them to GHCR, attaches an SBOM + SLSA provenance, and signs the digests with
# KEYLESS cosign (Sigstore / GitHub OIDC). PRs build + scan only (no push, no
# signing — those need trusted credentials not available to fork PRs).
on:
  push:
    branches: [main]
    tags:
      - 'platform-images-v*'
    paths:
      - 'platform/base-images/**'
      - '.github/workflows/platform-base-images.yml'
  pull_request:
    paths:
      - 'platform/base-images/**'
      - '.github/workflows/platform-base-images.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: platform-base-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-scan:
    name: Build & Trivy scan (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: php-apache
            dockerfile: platform/base-images/Dockerfile.php-apache
          - name: node
            dockerfile: platform/base-images/Dockerfile.node
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      # Build context is the repo root (per base-images/README.md). Load into the
      # local docker so Trivy can scan the built image before any push.
      - name: Build image (load, no push)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          load: true
          push: false
          tags: platform/${{ matrix.name }}:ci

      - name: Trivy image scan (HIGH/CRITICAL gate)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: platform/${{ matrix.name }}:ci
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
          vuln-type: os,library

  publish-sign:
    name: Push, attest & sign (${{ matrix.name }})
    # Only on a release tag — this pushes images and mints attestations.
    if: startsWith(github.ref, 'refs/tags/platform-images-v')
    needs: build-scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push to GHCR
      id-token: write # keyless cosign + provenance (OIDC)
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: php-apache
            dockerfile: platform/base-images/Dockerfile.php-apache
          - name: node
            dockerfile: platform/base-images/Dockerfile.node
    env:
      REGISTRY: ghcr.io
      IMAGE: ghcr.io/${{ github.repository_owner }}/platform/${{ matrix.name }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=match,pattern=platform-images-v(.*),group=1
            type=sha,format=long
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build & push (SBOM + provenance)
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true
          provenance: mode=max

      - name: Attest build provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Sign image (keyless cosign)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Verify signature (gate)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign verify "${IMAGE}@${DIGEST}" \
            --certificate-identity-regexp "^https://github.com/${{ github.repository }}/" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            | tee /dev/null
          echo "Signed & verified: ${IMAGE}@${DIGEST}"
