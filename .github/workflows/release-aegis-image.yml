name: AEGIS image (build · SBOM · sign)

# Supply-chain release pipeline for the AEGIS GRC hardened image
# (aegis/docker/Dockerfile.hardened — non-root, read-only-rootfs friendly).
# Builds the container, publishes it to GHCR, attaches an SBOM + SLSA build
# provenance as in-toto attestations, and signs the pushed digest with KEYLESS
# cosign (Sigstore, GitHub OIDC identity — no long-lived signing key). The final
# `cosign verify` step fails the job if the signature didn't take, so a release
# that isn't both signed and verifiable cannot go green. (SSDF PS.3 / SLSA build
# L3 provenance; CMMC/NIST 800-171 SI/CM supply-chain integrity.)
#
# Triggers: AEGIS-scoped tags (aegis-v*) and manual dispatch only — never on
# pull_request, since it pushes images and mints attestations which require
# trusted credentials not available to fork PRs. Scoped to aegis-v* (not v*) so
# it stays independent of the CITADEL release pipeline.
on:
  push:
    tags:
      - 'aegis-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Extra image tag to publish (e.g. 2025.06 or a release name)'
        required: false
        default: ''

concurrency:
  group: aegis-image-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-sign-attest:
    name: Build, push, attest & sign
    runs-on: ubuntu-latest
    permissions:
      contents: read          # checkout
      packages: write         # push image + attestations to GHCR
      id-token: write         # keyless cosign + provenance (OIDC)
      attestations: write     # actions/attest-build-provenance
    env:
      REGISTRY: ghcr.io
      # GHCR repositories must be lowercase; the owner here already is.
      IMAGE: ghcr.io/${{ github.repository_owner }}/aegis-server
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Install cosign
        uses: sigstore/cosign-installer@f713795cb21599bc4e5c4b58cbad1da852d7eeb9 # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derive tags/labels: semver from the git tag (when it parses), the raw tag
      # for traceability, a git-sha tag, and any extra tag from workflow_dispatch.
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=tag
            type=sha,format=long
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '' }}
          labels: |
            org.opencontainers.image.title=AEGIS GRC
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      # Build the hardened image (context = aegis/, matching the integration
      # smoke build), push by digest, and let BuildKit attach an SPDX SBOM +
      # max-mode SLSA provenance as attestations on the image index.
      - name: Build & push image
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: aegis
          file: aegis/docker/Dockerfile.hardened
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true
          provenance: mode=max

      # GitHub-native (SLSA) build-provenance attestation, stored in the GH
      # attestations API and discoverable with `gh attestation verify`.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      # Generate a CycloneDX SBOM from the *pushed* image and attach it as a
      # cosign attestation (keyless), complementing the BuildKit SPDX SBOM.
      - name: Generate CycloneDX SBOM (syft)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          image: ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
          format: cyclonedx-json
          output-file: aegis-sbom.cdx.json

      - name: Sign image (keyless cosign)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Attest SBOM to the image (keyless cosign)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign attest --yes --predicate aegis-sbom.cdx.json --type cyclonedx "${IMAGE}@${DIGEST}"

      # Gate: prove the signature is valid and bound to THIS workflow's identity.
      # If verification fails, the release fails — no unsigned image ships.
      - name: Verify signature (gate)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign verify "${IMAGE}@${DIGEST}" \
            --certificate-identity-regexp "^https://github.com/${{ github.repository }}/" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            | tee /dev/null
          echo "Signed & verified: ${IMAGE}@${DIGEST}"

      # Verify-at-build gate (fail-closed): confirm the GitHub build-provenance
      # attestation minted above (actions/attest-build-provenance, push-to-
      # registry) is present and verifiable for THIS digest. This workflow only
      # builds/publishes (no deploy), so the gate proves the attestation was
      # actually produced — a release without verifiable provenance fails here.
      # GHCR hosts the GH attestations API and the runner is logged into GHCR, so
      # `gh attestation verify` resolves the oci:// subject directly. `gh` is
      # preinstalled on ubuntu-latest. Needs attestations:read — the job already
      # grants attestations:write, which subsumes it.
      - name: Verify build provenance attestation (gate)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          gh attestation verify "oci://${IMAGE}@${DIGEST}" \
            --owner "${{ github.repository_owner }}"
          echo "Build provenance attestation verified: ${IMAGE}@${DIGEST}"

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: aegis-sbom-cyclonedx
          path: aegis-sbom.cdx.json
          if-no-files-found: warn

      - name: Job summary
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          {
            echo "### AEGIS image published"
            echo ""
            echo "- **Digest:** \`${IMAGE}@${DIGEST}\`"
            echo "- **Tags:** ${{ steps.meta.outputs.tags }}"
            echo "- **Signed:** keyless cosign (Sigstore / GitHub OIDC)"
            echo "- **Attestations:** SPDX SBOM + SLSA provenance (BuildKit), CycloneDX SBOM (cosign), GitHub build provenance"
            echo ""
            echo "Verify locally:"
            echo '```'
            echo "cosign verify ${IMAGE}@${DIGEST} \\"
            echo "  --certificate-identity-regexp '^https://github.com/${{ github.repository }}/' \\"
            echo "  --certificate-oidc-issuer 'https://token.actions.githubusercontent.com'"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
