  - package-ecosystem: "docker"
    directory: "/paladin"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "security"
      - "docker"

  - package-ecosystem: "docker"
