      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "security"
      - "python"
    groups:
      pip-minor-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "pip"
    directory: "/aeromarkup" # requirements.txt
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "security"
      - "python"
    groups:
      pip-minor-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "pip"
    directory: "/cmmc-agent" # requirements.txt
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "security"
      - "python"
    groups:
      pip-minor-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "pip"
    directory: "/business-insight-dashboard" # requirements.txt
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "security"
      - "python"
    groups:
      pip-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # ---------------------------------------------------------------------------
  # Docker — base-image updates for every directory containing a Dockerfile.
  # Dependabot scans the named directory for a `Dockerfile` (default name); for
  # non-default filenames the directory still needs its own entry. Build/
  # benchmark-fixture Dockerfiles (citadel/benchmark/corpus/*) and node_modules
  # copies are intentionally excluded.
