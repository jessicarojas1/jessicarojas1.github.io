# nginx server config for the cmmc2 static site (used by cmmc2/Dockerfile).
# Non-root nginx-unprivileged listens on 8080. Serves the portfolio tree with cmmc2 at
# /cmmc2/. Adds edge security headers (including a CSP HTTP header mirroring the page's
# <meta> CSP) and cache-control, and exposes /healthz for the container HEALTHCHECK.

server {
    listen       8080;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # ---- Security response headers (apply to all responses) ----
    # CSP mirrors the <meta http-equiv="Content-Security-Policy"> in cmmc2/index.html.
    add_header Content-Security-Policy "default-src 'self' blob:; script-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; style-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; img-src 'self' https: data: blob:; font-src 'self' https://cdn.jsdelivr.net; connect-src 'self' https://cdn.jsdelivr.net blob:; worker-src blob:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header X-Frame-Options "DENY" always;

    # ---- Health endpoint for the container HEALTHCHECK ----
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # ---- HTML: revalidate so updates ship promptly ----
    location ~* \.html$ {
        add_header Cache-Control "no-cache" always;
    }

    # ---- Static assets: long cache (these files are effectively versioned by deploy) ----
    location ~* \.(?:css|js|ico|png|jpg|jpeg|svg|woff2?)$ {
        add_header Cache-Control "public, max-age=86400" always;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
