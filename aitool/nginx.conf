# nginx server config for the aitool static site (used by the Dockerfile).
# Adds security + cache headers. Adjust the CSP to match how you deliver assets.
server {
    listen       8080;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # ---- Security headers ----
    add_header X-Content-Type-Options   "nosniff"            always;
    add_header X-Frame-Options          "DENY"               always;
    add_header Referrer-Policy          "no-referrer"        always;
    add_header Permissions-Policy       "geolocation=(), camera=(), microphone=()" always;

    # Content-Security-Policy.
    # All page scripts are now external (theme-init.js, the per-page *.js, and the
    # shared parent scripts) and Print buttons use data-print + a delegated handler,
    # so script-src no longer needs 'unsafe-inline'. Each HTML page also ships a
    # matching <meta http-equiv="Content-Security-Policy"> for hosts that don't set
    # headers (e.g. GitHub Pages). style-src keeps 'unsafe-inline' for the inline
    # style= attributes and branding accent styles. Bootstrap is loaded from
    # cdn.jsdelivr.net with SRI. See OPEN_ITEMS.md / docs/SECURITY.md.
    add_header Content-Security-Policy "default-src 'self'; \
script-src 'self' https://cdn.jsdelivr.net; \
style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; \
img-src 'self' data:; \
font-src 'self' https://cdn.jsdelivr.net; \
connect-src 'self'; \
object-src 'none'; \
frame-ancestors 'none'; \
base-uri 'self'; \
form-action 'self'" always;

    # ---- Caching ----
    # HTML: always revalidate so updates ship immediately.
    location ~* \.html$ {
        add_header Cache-Control "no-cache";
    }
    # Static assets (js/css/img): long cache; bust by changing the CDN version/filename.
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        add_header Cache-Control "public, max-age=604800";
    }

    location / {
        try_files $uri $uri/ =404;
    }

    # No directory listing.
    autoindex off;
}
