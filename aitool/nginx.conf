# nginx server config for the aitool static site (used by the Dockerfile).
# Adds security + cache headers. Adjust the CSP to match how you deliver assets.
server {
    listen       8080;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # ---- Security headers ----
    add_header X-Content-Type-Options   "nosniff"            always;
    add_header X-Frame-Options          "DENY"               always;
    add_header Referrer-Policy          "no-referrer"        always;
    add_header Permissions-Policy       "geolocation=(), camera=(), microphone=()" always;

    # Content-Security-Policy.
    # NOTE (honest): the pages include an inline <head> theme-bootstrap <script> and
    # five inline `onclick="window.print()"` handlers, so a strict script CSP requires
    # 'unsafe-inline' (or refactoring those out — see OPEN_ITEMS.md / docs/SECURITY.md).
    # Bootstrap is loaded from cdn.jsdelivr.net with SRI.
    add_header Content-Security-Policy "default-src 'self'; \
script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; \
style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; \
img-src 'self' data:; \
font-src 'self' https://cdn.jsdelivr.net; \
connect-src 'self'; \
frame-ancestors 'none'; \
base-uri 'self'; \
form-action 'self'" always;

    # ---- Caching ----
    # HTML: always revalidate so updates ship immediately.
    location ~* \.html$ {
        add_header Cache-Control "no-cache";
    }
    # Static assets (js/css/img): long cache; bust by changing the CDN version/filename.
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        add_header Cache-Control "public, max-age=604800";
    }

    location / {
        try_files $uri $uri/ =404;
    }

    # No directory listing.
    autoindex off;
}
