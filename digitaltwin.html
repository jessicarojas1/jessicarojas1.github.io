<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <script>(function(){document.documentElement.setAttribute('data-bs-theme',localStorage.getItem('bsTheme')||'dark');})()</script>
  <link rel="icon" href="favicon.ico"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" crossorigin="anonymous">
  <link rel="stylesheet" href="theme.css"/>
  <title>Digital Twin — Enterprise Security | Jessica Rojas</title>
  <meta name="description" content="Interactive digital twin of an enterprise security program — navigate assets, systems, controls, risks, and trust boundaries visually."/>
  <style>
    html,body{height:100%;margin:0;overflow:hidden;background:#07091299;}

    /* ── Canvas shell ───────────────────────────── */
    #dt-shell{display:flex;flex-direction:column;height:100vh;}
    #dt-topbar{flex-shrink:0;background:#0b0f1e;border-bottom:1px solid #1e2a45;padding:6px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;z-index:20;}
    #dt-canvas-wrap{flex:1;position:relative;overflow:hidden;}
    #cy{width:100%;height:100%;background:#070b18;}

    /* ── Topbar ─────────────────────────────────── */
    .dt-logo{display:flex;align-items:center;gap:8px;font-size:.85rem;font-weight:700;color:#60a5fa;white-space:nowrap;}
    .dt-logo svg{flex-shrink:0;}
    .dt-search-wrap{position:relative;flex:0 0 220px;}
    .dt-search-wrap input{background:#111827;border:1px solid #1e2a45;color:#e2e8f0;font-size:.8rem;padding:5px 10px 5px 30px;border-radius:6px;width:100%;outline:none;}
    .dt-search-wrap input:focus{border-color:#3b82f6;}
    .dt-search-wrap svg{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:#475569;}
    .filter-btn{background:#111827;border:1px solid #1e2a45;color:#94a3b8;font-size:.72rem;padding:4px 10px;border-radius:5px;cursor:pointer;transition:all .15s;white-space:nowrap;}
    .filter-btn:hover,.filter-btn.active{background:#1e3a5f;border-color:#3b82f6;color:#93c5fd;}
    .filter-btn.f-risk   .dot{background:#ef4444;}
    .filter-btn.f-control .dot{background:#f59e0b;}
    .filter-btn.f-asset  .dot{background:#3b82f6;}
    .filter-btn.f-system .dot{background:#8b5cf6;}
    .filter-btn.f-user   .dot{background:#10b981;}
    .filter-btn.f-incident .dot{background:#be123c;}
    .filter-btn.f-evidence .dot{background:#06b6d4;}
    .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;}
    .dt-divider{width:1px;height:22px;background:#1e2a45;flex-shrink:0;}
    .dt-btn{background:#111827;border:1px solid #1e2a45;color:#94a3b8;font-size:.75rem;padding:5px 10px;border-radius:5px;cursor:pointer;transition:all .15s;}
    .dt-btn:hover{border-color:#3b82f6;color:#93c5fd;}
    #dt-scorecard{margin-left:auto;display:flex;gap:12px;align-items:center;}
    .sc-item{text-align:center;}
    .sc-val{font-size:1rem;font-weight:700;line-height:1;}
    .sc-lbl{font-size:.62rem;color:#475569;text-transform:uppercase;letter-spacing:.05em;}

    /* ── Zone legend pill ───────────────────────── */
    #zone-legend{position:absolute;bottom:12px;left:12px;z-index:10;display:flex;flex-direction:column;gap:5px;}
    .zone-pill{display:flex;align-items:center;gap:6px;font-size:.7rem;color:#94a3b8;background:rgba(7,11,24,.85);border:1px solid #1e2a45;padding:3px 8px;border-radius:20px;backdrop-filter:blur(4px);}
    .zone-swatch{width:10px;height:10px;border-radius:2px;flex-shrink:0;}

    /* ── Minimap ─────────────────────────────────── */
    #dt-minimap{position:absolute;bottom:12px;right:380px;z-index:10;background:rgba(7,11,24,.9);border:1px solid #1e2a45;border-radius:8px;padding:6px;width:160px;}
    #dt-minimap.panel-open{right:520px;}
    #dt-minimap .mm-title{font-size:.65rem;color:#475569;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;}
    #mm-canvas{width:148px;height:90px;border-radius:4px;background:#0d1425;}

    /* ── Crosshair coords ───────────────────────── */
    #dt-coords{position:absolute;bottom:12px;right:12px;font-size:.68rem;color:#334155;z-index:5;}
    #dt-coords.panel-open{right:400px;}

    /* ── Detail panel ───────────────────────────── */
    #dt-panel{position:absolute;top:0;right:0;height:100%;width:380px;background:#0b0f1e;border-left:1px solid #1e2a45;transform:translateX(100%);transition:transform .25s ease;z-index:15;display:flex;flex-direction:column;overflow:hidden;}
    #dt-panel.open{transform:translateX(0);}
    #panel-header{flex-shrink:0;padding:16px;border-bottom:1px solid #1e2a45;display:flex;align-items:flex-start;gap:12px;}
    #panel-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;}
    #panel-close{margin-left:auto;background:none;border:none;color:#475569;cursor:pointer;padding:2px;font-size:1rem;line-height:1;}
    #panel-close:hover{color:#94a3b8;}
    #panel-body{flex:1;overflow-y:auto;padding:14px;}
    #panel-body::-webkit-scrollbar{width:4px;}
    #panel-body::-webkit-scrollbar-thumb{background:#1e2a45;border-radius:4px;}

    .p-section{margin-bottom:16px;}
    .p-section-title{font-size:.65rem;text-transform:uppercase;letter-spacing:.07em;color:#475569;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
    .p-section-title::after{content:'';flex:1;height:1px;background:#1e2a45;}
    .p-metric-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
    .p-metric{background:#111827;border:1px solid #1e2a45;border-radius:8px;padding:10px;}
    .p-metric .val{font-size:1.2rem;font-weight:700;line-height:1;}
    .p-metric .lbl{font-size:.68rem;color:#475569;margin-top:2px;}
    .p-tag{display:inline-flex;align-items:center;gap:4px;font-size:.7rem;background:#111827;border:1px solid #1e2a45;border-radius:4px;padding:3px 8px;margin:2px;color:#94a3b8;cursor:pointer;transition:all .15s;}
    .p-tag:hover{border-color:#3b82f6;color:#93c5fd;}
    .p-tag .dot{width:6px;height:6px;margin-right:2px;}
    .p-bar-wrap{background:#111827;border-radius:4px;overflow:hidden;height:6px;margin-top:4px;}
    .p-bar{height:100%;border-radius:4px;transition:width .5s ease;}
    .risk-badge{display:inline-block;font-size:.68rem;font-weight:600;padding:2px 8px;border-radius:20px;}
    .risk-critical{background:#7f1d1d;color:#fca5a5;}
    .risk-high{background:#7c2d12;color:#fdba74;}
    .risk-medium{background:#713f12;color:#fde68a;}
    .risk-low{background:#14532d;color:#86efac;}

    /* ── Pulse animation for high-risk nodes ─────── */
    @keyframes pulse-ring{0%{box-shadow:0 0 0 0 rgba(239,68,68,.4);}70%{box-shadow:0 0 0 8px rgba(239,68,68,0);}100%{box-shadow:0 0 0 0 rgba(239,68,68,0);}}

    /* ── Tooltip ─────────────────────────────────── */
    #dt-tooltip{position:absolute;pointer-events:none;background:#0b0f1e;border:1px solid #1e2a45;border-radius:6px;padding:6px 10px;font-size:.73rem;color:#e2e8f0;max-width:200px;z-index:25;opacity:0;transition:opacity .1s;}
    #dt-tooltip.show{opacity:1;}

    /* ── Focus overlay ───────────────────────────── */
    .faded{opacity:.15!important;}

    /* ── Scrollbar ───────────────────────────────── */
    *::-webkit-scrollbar{width:5px;}
    *::-webkit-scrollbar-track{background:transparent;}
    *::-webkit-scrollbar-thumb{background:#1e2a45;border-radius:3px;}
  </style>
</head>
<body>

<!-- RBAC Login Modal -->
<div class="modal" id="rbacLoginModal" tabindex="-1" aria-labelledby="rbacModalLabel" aria-modal="true" role="dialog">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title fs-5" id="rbacModalLabel">🔒 Login</h2>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
          <!-- roles.js injects login form here -->
        </div>
      <div class="modal-footer border-0 pt-0"><p class="text-secondary small mb-0">Session clears when you close this tab.</p></div>
    </div>
  </div>
</div>

<div id="dt-shell">
  <!-- ══ Topbar ══════════════════════════════════════════════ -->
  <div id="dt-topbar">
    <!-- Logo -->
    <div class="dt-logo">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5 12 2"/><line x1="12" y1="22" x2="12" y2="15.5"/><polyline points="22 8.5 12 15.5 2 8.5"/>
      </svg>
      Digital Twin
    </div>
    <div class="dt-divider"></div>

    <!-- Search -->
    <div class="dt-search-wrap">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="dt-search" placeholder="Search nodes…" autocomplete="off" spellcheck="false"/>
    </div>
    <div class="dt-divider"></div>

    <!-- Type filters -->
    <span style="font-size:.68rem;color:#334155;white-space:nowrap">Show:</span>
    <button class="filter-btn f-asset  active" data-type="asset">    <span class="dot"></span>Assets</button>
    <button class="filter-btn f-system active" data-type="system">   <span class="dot"></span>Systems</button>
    <button class="filter-btn f-user   active" data-type="user">     <span class="dot"></span>Users</button>
    <button class="filter-btn f-control active" data-type="control"> <span class="dot"></span>Controls</button>
    <button class="filter-btn f-risk   active" data-type="risk">     <span class="dot"></span>Risks</button>
    <button class="filter-btn f-incident active" data-type="incident"><span class="dot"></span>Incidents</button>
    <button class="filter-btn f-evidence active" data-type="evidence"><span class="dot"></span>Evidence</button>
    <div class="dt-divider"></div>

    <!-- View controls -->
    <button class="dt-btn" id="btn-reset-view">⟲ Reset View</button>
    <button class="dt-btn" id="btn-focus-mode">◎ Focus Mode: Off</button>
    <button class="dt-btn" id="btn-export">⬇ Export PNG</button>

    <!-- Login -->
    <button class="dt-btn" id="rbac-login-btn" data-bs-toggle="modal" data-bs-target="#rbacLoginModal">Login</button>
    <div class="d-flex align-items-center gap-2 d-none" id="rbac-user-area">
      <span id="rbac-role-badge" class="badge bg-secondary" style="font-size:.65rem"></span>
      <span id="rbac-username" class="text-body-secondary small fw-semibold" style="font-size:.75rem"></span>
      <button class="dt-btn" id="rbac-logout-btn">Logout</button>
    </div>

    <!-- Theme -->
    <button class="dt-btn" id="themeToggleBtn" aria-label="Toggle theme"><span class="theme-icon">☀️</span></button>

    <!-- Scorecard -->
    <div id="dt-scorecard">
      <div class="sc-item"><div class="sc-val" id="sc-assets" style="color:#3b82f6">0</div><div class="sc-lbl">Assets</div></div>
      <div class="sc-item"><div class="sc-val" id="sc-risks"  style="color:#ef4444">0</div><div class="sc-lbl">Open Risks</div></div>
      <div class="sc-item"><div class="sc-val" id="sc-controls" style="color:#f59e0b">0</div><div class="sc-lbl">Controls</div></div>
      <div class="sc-item"><div class="sc-val" id="sc-incidents" style="color:#be123c">0</div><div class="sc-lbl">Incidents</div></div>
    </div>
  </div>

  <!-- ══ Canvas ═══════════════════════════════════════════════ -->
  <div id="dt-canvas-wrap">
    <div id="cy"></div>

    <!-- Zone legend -->
    <div id="zone-legend">
      <div class="zone-pill"><div class="zone-swatch" style="background:#7f1d1d55;border:1px solid #7f1d1d"></div>Internet / External</div>
      <div class="zone-pill"><div class="zone-swatch" style="background:#14532d55;border:1px solid #14532d"></div>DMZ</div>
      <div class="zone-pill"><div class="zone-swatch" style="background:#1e3a5f55;border:1px solid #1e3a5f"></div>Corporate Network</div>
      <div class="zone-pill"><div class="zone-swatch" style="background:#4a1d9655;border:1px solid #4a1d96"></div>CUI Enclave</div>
      <div class="zone-pill"><div class="zone-swatch" style="background:#0f172a55;border:1px solid #164e63"></div>Cloud (Azure/AWS)</div>
      <div class="zone-pill"><div class="zone-swatch" style="background:#3b270055;border:1px solid #92400e"></div>OT / ICS</div>
    </div>

    <!-- Detail panel -->
    <div id="dt-panel">
      <div id="panel-header">
        <div id="panel-icon">🔷</div>
        <div style="flex:1;min-width:0;">
          <div id="panel-type-badge" style="font-size:.65rem;color:#475569;text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px;">Asset</div>
          <div id="panel-name" style="font-size:1rem;font-weight:700;color:#e2e8f0;line-height:1.2;"></div>
          <div id="panel-zone" style="font-size:.72rem;color:#475569;margin-top:2px;"></div>
        </div>
        <button id="panel-close">✕</button>
      </div>
      <div id="panel-body"></div>
    </div>

    <!-- Tooltip -->
    <div id="dt-tooltip"></div>

    <!-- Coords -->
    <div id="dt-coords">x:0 y:0</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>

/* ══ BUILD CYTOSCAPE ELEMENTS ════════════════════════════════════════════ */
function buildElements() {
  var els = [];

  // Zone backdrops
  zones.forEach(function(z) {
    var zc = ZONE_COLORS[z.zone];
    els.push({ data:{id:z.id, label:z.label, type:'zone', zone:z.zone,
      w:z.w, h:z.h}, position:{x:z.x+z.w/2, y:z.y+z.h/2}, classes:'zone-node' });
  });

  // Assets
  assets.forEach(function(a) {
    els.push({ data:{id:a.id, label:a.label, type:'asset', zone:a.zone,
      risk:a.risk, status:a.status, desc:a.desc, coverage:a.coverage,
      issues:a.issues, issues_n:a.issues}, position:{x:a.x, y:a.y}, classes:'asset' });
  });

  // Systems
  systems.forEach(function(s) {
    els.push({ data:{id:s.id, label:s.label, type:'system', zone:s.zone,
      risk:s.risk, desc:s.desc, coverage:s.coverage,
      components:s.components, controls:s.controls, risks:s.risks },
      position:{x:s.x, y:s.y}, classes:'system' });
  });

  // Users
  users.forEach(function(u) {
    els.push({ data:{id:u.id, label:u.label, type:'user', zone:u.zone,
      risk:u.risk, desc:u.desc}, position:{x:u.x, y:u.y}, classes:'user' });
  });

  // Controls
  controls.forEach(function(c) {
    els.push({ data:{id:c.id, label:c.label, type:'control', zone:c.zone,
      risk:'low', status:c.status, coverage:c.coverage, desc:c.desc},
      position:{x:c.x, y:c.y}, classes:'control' });
  });

  // Risks
  risks.forEach(function(r) {
    els.push({ data:{id:r.id, label:r.label, type:'risk', zone:r.zone,
      risk:r.severity, severity:r.severity, desc:r.desc},
      position:{x:r.x, y:r.y}, classes:'risk risk-'+r.severity });
  });

  // Incidents
  incidents.forEach(function(i) {
    els.push({ data:{id:i.id, label:i.label, type:'incident', zone:i.zone,
      risk:i.severity, severity:i.severity, status:i.status, desc:i.desc},
      position:{x:i.x, y:i.y}, classes:'incident' });
  });

  // Evidence
  evidence.forEach(function(ev) {
    els.push({ data:{id:ev.id, label:ev.label, type:'evidence', zone:ev.zone,
      risk:'low', status:ev.status, desc:ev.desc},
      position:{x:ev.x, y:ev.y}, classes:'evidence' });
  });

  // Edges
  edges.forEach(function(e) {
    els.push({ data:{id:e.id, source:e.source, target:e.target,
      rel:e.rel, label:e.label} });
  });

  return els;
}

  panelType.textContent    = d.type.toUpperCase();
  panelType.style.color    = tc;
  panelZone.textContent    = d.zone ? 'Zone: ' + (ZONE_COLORS[d.zone]||{label:d.zone}).label : '';

  // Build connected node lists
  var connected = { upstream:[], downstream:[] };
  cy.edges().forEach(function(e) {
    var ed = e.data();
    if (ed.source === d.id) {
      var t = cy.getElementById(ed.target).data();
      if (t && t.type !== 'zone') connected.downstream.push({id:ed.target, label:(t.label||'').replace(/\n/g,' '), type:t.type, rel:ed.rel});
    }
    if (ed.target === d.id) {
      var s = cy.getElementById(ed.source).data();
      if (s && s.type !== 'zone') connected.upstream.push({id:ed.source, label:(s.label||'').replace(/\n/g,' '), type:s.type, rel:ed.rel});
    }
  });

  var html = '';

  // Description
  if (d.desc) {
    html += '<div class="p-section"><div class="p-section-title">Description</div>'
          + '<p style="font-size:.8rem;color:#94a3b8;line-height:1.5;margin:0">' + d.desc + '</p></div>';
  }

  // Metrics
  var metrics = [];
  if (d.coverage !== undefined) metrics.push({val: d.coverage+'%', lbl:'Log Coverage', color: d.coverage>=80?'#10b981':d.coverage>=50?'#f59e0b':'#ef4444'});
  if (d.issues_n !== undefined) metrics.push({val: d.issues_n, lbl:'Open Issues', color: d.issues_n>0?'#ef4444':'#10b981'});
  if (d.severity) metrics.push({val: d.severity.toUpperCase(), lbl:'Severity', color: RISK_COLORS[d.severity]||'#ef4444'});
  if (d.status && d.type !== 'asset') metrics.push({val: (d.status||'').replace(/_/g,' '), lbl:'Status', color:'#94a3b8'});

  if (metrics.length) {
    html += '<div class="p-section"><div class="p-section-title">Metrics</div><div class="p-metric-row">';
    metrics.forEach(function(m) {
      html += '<div class="p-metric"><div class="val" style="color:' + m.color + '">' + m.val + '</div><div class="lbl">' + m.lbl + '</div></div>';
    });
    html += '</div>';

    if (d.coverage !== undefined) {
      var bc = d.coverage>=80?'#10b981':d.coverage>=50?'#f59e0b':'#ef4444';
      html += '<div style="margin-top:4px"><div style="font-size:.68rem;color:#475569;margin-bottom:3px">Logging Coverage</div>'
            + '<div class="p-bar-wrap"><div class="p-bar" style="width:'+d.coverage+'%;background:'+bc+'"></div></div></div>';
    }
    html += '</div>';
  }

  // Connected upstream
  if (connected.upstream.length) {
    html += '<div class="p-section"><div class="p-section-title">Incoming Relationships (' + connected.upstream.length + ')</div>';
    connected.upstream.forEach(function(n) {
      var nc = TYPE_COLORS[n.type]||'#64748b';
      html += '<span class="p-tag" onclick="focusNode(\''+n.id+'\')" title="'+n.rel+'">'
            + '<span class="dot" style="background:'+nc+'"></span>' + n.label
            + '<span style="font-size:.6rem;color:#475569;margin-left:4px">'+n.rel+'</span></span>';
    });
    html += '</div>';
  }

  // Connected downstream
  if (connected.downstream.length) {
    html += '<div class="p-section"><div class="p-section-title">Outgoing Relationships (' + connected.downstream.length + ')</div>';
    connected.downstream.forEach(function(n) {
      var nc = TYPE_COLORS[n.type]||'#64748b';
      html += '<span class="p-tag" onclick="focusNode(\''+n.id+'\')" title="'+n.rel+'">'
            + '<span class="dot" style="background:'+nc+'"></span>' + n.label
            + '<span style="font-size:.6rem;color:#475569;margin-left:4px">'+n.rel+'</span></span>';
    });
    html += '</div>';
  }

  // Quick actions
  html += '<div class="p-section" style="margin-top:16px"><div class="p-section-title">Actions</div>'
        + '<div style="display:flex;gap:6px;flex-wrap:wrap">'
        + '<button class="dt-btn" onclick="focusNode(\''+d.id+'\')">◎ Focus</button>'
        + '<button class="dt-btn" onclick="cy.getElementById(\''+d.id+'\').neighborhood().select()">⎇ Select Neighbors</button>'
        + '</div></div>';

  panelBody.innerHTML = html;
  panel.classList.add('open');
  document.getElementById('dt-coords').classList.add('panel-open');
  var mm = document.getElementById('dt-minimap');
  if (mm) mm.classList.add('panel-open');
}

document.getElementById('panel-close').addEventListener('click', function() {
  panel.classList.remove('open');
  document.getElementById('dt-coords').classList.remove('panel-open');
  var mm = document.getElementById('dt-minimap');
  if (mm) mm.classList.remove('panel-open');
  cy.elements().removeClass('faded');
});

cy.on('tap', 'node:not(.zone-node)', function(e) {
  openPanel(e.target);
});

/* ══ FOCUS MODE ══════════════════════════════════════════════════════════ */
var focusMode = false;
var focusBtn  = document.getElementById('btn-focus-mode');

focusBtn.addEventListener('click', function() {
  focusMode = !focusMode;
  focusBtn.textContent = '◎ Focus Mode: ' + (focusMode ? 'On' : 'Off');
  focusBtn.classList.toggle('active', focusMode);
  if (!focusMode) cy.elements().removeClass('faded');
});

cy.on('tap', 'node:not(.zone-node)', function(e) {
  if (!focusMode) return;
  var node = e.target;
  cy.elements().addClass('faded');
  node.removeClass('faded');
  node.neighborhood().removeClass('faded');
});

window.focusNode = function(id) {
  var node = cy.getElementById(id);
  if (!node.length) return;
  cy.animate({ center:{ eles:node }, zoom:1.4 }, { duration:400 });
  openPanel(node);
};

/* ══ SEARCH ══════════════════════════════════════════════════════════════ */
document.getElementById('dt-search').addEventListener('input', function() {
  var q = this.value.trim().toLowerCase();
  cy.elements().removeClass('faded');
  if (!q) return;
  cy.nodes(':not(.zone-node)').forEach(function(n) {
    var label = (n.data('label')||'').toLowerCase();
    var desc  = (n.data('desc')||'').toLowerCase();
    if (!label.includes(q) && !desc.includes(q)) n.addClass('faded');
    else { n.removeClass('faded'); cy.animate({center:{eles:n}},{duration:300}); }
  });
});

/* ══ TYPE FILTERS ════════════════════════════════════════════════════════ */
document.querySelectorAll('.filter-btn[data-type]').forEach(function(btn) {
  btn.addEventListener('click', function() {
    btn.classList.toggle('active');
    var type = btn.dataset.type;
    var show = btn.classList.contains('active');
    cy.nodes('[type="'+type+'"]').style('display', show ? 'element' : 'none');
  });
});

/* ══ RESET VIEW ══════════════════════════════════════════════════════════ */
document.getElementById('btn-reset-view').addEventListener('click', function() {
  cy.animate({ fit:{ padding:60 } }, { duration:400 });
  cy.elements().removeClass('faded');
  panel.classList.remove('open');
});

/* ══ EXPORT ══════════════════════════════════════════════════════════════ */
document.getElementById('btn-export').addEventListener('click', function() {
  var png = cy.png({ output:'blob', bg:'#070b18', scale:2 });
  var url = URL.createObjectURL(png);
  var a = document.createElement('a'); a.href=url; a.download='security-digital-twin.png'; a.click();
  URL.revokeObjectURL(url);
});

/* ══ FIT ON LOAD ══════════════════════════════════════════════════════════ */
cy.ready(function() { cy.fit(60); });

/* ══ CLICK BACKGROUND = DESELECT ═════════════════════════════════════════ */
cy.on('tap', function(e) { if (e.target === cy) { cy.elements().removeClass('faded'); } });

})(); // end IIFE
</script>
